<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アガーキャンバス</title>
  <meta name="description" content="HTML5 Canvasで遊べるAgar.io風のブラウザゲーム">
  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --panel: rgba(255, 255, 255, 0.84);
      --ink: #142033;
      --muted: #667085;
      --line: rgba(20, 32, 51, 0.12);
      --accent: #177ddc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f7f9fc;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      user-select: none;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      inset: auto auto 14px 14px;
      min-width: 156px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 26px rgba(16, 24, 40, 0.08);
      pointer-events: none;
    }

    .hud-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 18px;
      min-height: 22px;
      font-size: 12px;
      letter-spacing: 0;
      color: var(--muted);
    }

    .hud-row strong {
      color: var(--ink);
      font-size: 15px;
      font-variant-numeric: tabular-nums;
    }

    .board {
      position: fixed;
      inset: 14px 14px auto auto;
      width: min(260px, calc(100vw - 190px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 26px rgba(16, 24, 40, 0.08);
      pointer-events: none;
    }

    .board-title {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .rank {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 8px;
      min-height: 22px;
      font-size: 12px;
      line-height: 1.2;
    }

    .rank span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank b {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .rank.you {
      color: #0b5cab;
      font-weight: 700;
    }

    .flash {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      font-size: 13px;
      opacity: 0;
      transition: opacity 160ms ease;
      pointer-events: none;
    }

    .flash.show {
      opacity: 1;
    }

    .menu-button {
      position: fixed;
      inset: 14px auto auto 14px;
      min-width: 72px;
      min-height: 34px;
      border: 1px solid rgba(23, 125, 220, 0.32);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #0b5cab;
      font: 700 12px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      box-shadow: 0 10px 26px rgba(16, 24, 40, 0.08);
      cursor: pointer;
      z-index: 6;
    }

    .menu-button:hover {
      background: rgba(23, 125, 220, 0.08);
    }

    .menu-screen {
      position: fixed;
      inset: 0;
      display: none;
      overflow-y: auto;
      place-items: start center;
      padding: 56px 14px 18px;
      background: rgba(18, 32, 70, 0.2);
      z-index: 20;
      pointer-events: none;
    }

    body.menu-open .menu-screen {
      display: grid;
    }

    body.menu-open .menu-button {
      display: none;
    }

    .menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(780px, calc(100vw - 28px));
      min-height: 56px;
      margin: 0;
      padding: 8px 10px;
      border: 1px solid rgba(0, 220, 255, 0.85);
      border-bottom: 0;
      border-radius: 4px 4px 0 0;
      background:
        linear-gradient(128deg, rgba(0, 25, 64, 0.9), rgba(0, 116, 158, 0.72)),
        repeating-linear-gradient(117deg, rgba(0, 241, 255, 0.14) 0 8px, transparent 8px 18px);
      box-shadow: 0 18px 34px rgba(7, 18, 38, 0.28);
      pointer-events: auto;
    }

    .menu-head strong {
      color: #13f6ff;
      font-size: 27px;
      font-weight: 800;
      letter-spacing: 0;
      text-shadow: 0 0 14px rgba(19, 246, 255, 0.42);
    }

    .menu-head button {
      min-width: 100px;
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 3px;
      background: #ff1694;
      color: #ffffff;
      font: 800 13px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .menu-layout {
      display: block;
      width: min(780px, calc(100vw - 28px));
      max-height: calc(100vh - 126px);
      margin: 0;
      padding: 6px;
      border: 1px solid rgba(0, 220, 255, 0.85);
      border-radius: 0 0 4px 4px;
      background:
        linear-gradient(135deg, rgba(0, 17, 48, 0.92), rgba(0, 110, 150, 0.66)),
        repeating-linear-gradient(126deg, rgba(20, 240, 255, 0.13) 0 7px, transparent 7px 17px);
      box-shadow: 0 18px 34px rgba(7, 18, 38, 0.28);
      overflow: hidden;
      pointer-events: auto;
    }

    .menu-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 6px;
    }

    .menu-tab {
      min-height: 32px;
      border: 1px solid rgba(0, 220, 255, 0.58);
      border-radius: 3px;
      background: rgba(0, 126, 255, 0.34);
      color: #8feeff;
      font: 800 12px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    .menu-tab.active {
      background: #0095ff;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.72);
    }

    .menu-page {
      display: none;
      min-height: 0;
    }

    .menu-page.active {
      display: grid;
      gap: 6px;
    }

    .menu-page.settings-page.active {
      max-height: calc(100vh - 188px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .online-panel {
      position: fixed;
      inset: 14px auto auto 14px;
      width: min(360px, calc(100vw - 28px));
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 26px rgba(16, 24, 40, 0.08);
      pointer-events: auto;
    }

    .online-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .online-status {
      max-width: 168px;
      overflow: hidden;
      color: var(--accent);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .online-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .online-controls button {
      min-height: 30px;
      border: 1px solid rgba(23, 125, 220, 0.32);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: #0b5cab;
      font: 700 12px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    .online-controls button:hover {
      background: rgba(23, 125, 220, 0.08);
    }

    .online-fields {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(76px, 0.6fr);
      gap: 6px;
      margin-top: 7px;
    }

    .online-panel input {
      width: 100%;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 7px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font: 11px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .online-panel textarea {
      width: 100%;
      height: 48px;
      margin-top: 7px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font: 11px/1.3 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .view-panel {
      position: fixed;
      inset: auto 14px 14px auto;
      width: min(430px, calc(100vw - 190px));
      max-height: calc(100vh - 28px);
      overflow-y: auto;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 26px rgba(16, 24, 40, 0.08);
      pointer-events: auto;
    }

    .profile-panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(0, 220, 255, 0.7);
      border-radius: 4px;
      background: rgba(0, 13, 38, 0.58);
      color: #13f6ff;
    }

    .menu-screen .profile-panel,
    .menu-screen .online-panel,
    .menu-screen .view-panel {
      position: static;
      width: 100%;
      max-height: none;
      border-color: rgba(0, 220, 255, 0.72);
      border-radius: 3px;
      background: rgba(0, 18, 52, 0.62);
      color: #dffbff;
      box-shadow: none;
      backdrop-filter: none;
    }

    .profile-panel input {
      min-height: 34px;
      border: 1px solid rgba(0, 220, 255, 0.65);
      border-radius: 3px;
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.96);
      color: #111827;
      font: 700 13px/1.2 Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .view-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .view-row strong {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .view-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .setting-control {
      display: grid;
      grid-template-columns: 92px minmax(150px, 1fr) 58px 72px;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .setting-control strong {
      color: var(--accent);
      text-align: right;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .max-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 5px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font: 700 11px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .mode-select {
      grid-column: 2 / 5;
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 6px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font: 700 11px/1 Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .toggle-input {
      justify-self: start;
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .toggle-value {
      grid-column: 3 / 5;
    }

    .view-panel input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .view-controls button {
      grid-column: 2;
      min-height: 28px;
      border: 1px solid rgba(23, 125, 220, 0.32);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: #0b5cab;
      font: 700 11px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    .view-controls button:hover {
      background: rgba(23, 125, 220, 0.08);
    }

    .keybind-title {
      margin: 10px 0 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .keybind-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .keybind-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 74px;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .keybind-control button {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: #0b5cab;
      font: 700 11px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    .menu-screen .online-title,
    .menu-screen .view-row,
    .menu-screen .setting-control,
    .menu-screen .keybind-title,
    .menu-screen .keybind-control {
      color: #8feeff;
    }

    .menu-screen .view-row strong,
    .menu-screen .setting-control strong,
    .menu-screen .online-status {
      color: #17f5ff;
    }

    .menu-screen input:not([type="range"]):not([type="checkbox"]),
    .menu-screen textarea,
    .menu-screen select,
    .menu-screen .keybind-control button,
    .menu-screen .online-controls button,
    .menu-screen .view-controls button {
      border-color: rgba(0, 220, 255, 0.54);
      background: rgba(255, 255, 255, 0.9);
    }

    .menu-screen .online-controls button,
    .menu-screen .view-controls button {
      color: #006bb6;
    }

    .menu-screen .online-controls button:hover,
    .menu-screen .view-controls button:hover,
    .menu-screen .keybind-control button:hover {
      background: #e7fbff;
    }

    @media (max-width: 640px) {
      .hud {
        inset: auto auto 10px 10px;
        min-width: 134px;
      }

      .board {
        inset: 10px 10px auto auto;
        width: min(230px, calc(100vw - 156px));
      }

      .rank:nth-of-type(n + 7) {
        display: none;
      }

      .online-panel {
        width: min(320px, calc(100vw - 20px));
      }

      .view-panel {
        width: min(380px, calc(100vw - 158px));
      }

      .menu-screen {
        padding: 46px 10px 10px;
      }

      .menu-head,
      .menu-layout {
        width: calc(100vw - 20px);
      }

      .menu-head strong {
        font-size: 21px;
      }

      .menu-layout {
        grid-template-columns: 1fr;
        max-height: calc(100vh - 104px);
        overflow-y: auto;
      }

      .keybind-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <section class="hud" aria-label="状態">
    <div class="hud-row"><span>質量</span><strong id="mass">0</strong></div>
    <div class="hud-row"><span>細胞</span><strong id="cells">1/16</strong></div>
    <div class="hud-row"><span>FPS</span><strong id="fps">60</strong></div>
  </section>

  <aside class="board" aria-label="ランキング">
    <div class="board-title">ランキング</div>
    <div id="scoreboard"></div>
  </aside>

  <div id="flash" class="flash">復活</div>

  <button id="menuBtn" class="menu-button" type="button">設定</button>

  <section id="menuScreen" class="menu-screen" aria-label="メニュー">
    <div class="menu-head">
      <strong>AGAR CANVAS</strong>
      <button id="playBtn" type="button">PLAY</button>
    </div>
    <div class="menu-layout">
      <div class="menu-tabs" role="tablist" aria-label="メニューページ">
        <button class="menu-tab active" type="button" data-menu-page="home">プレイ</button>
        <button class="menu-tab" type="button" data-menu-page="settings">設定</button>
      </div>

      <div id="menuPageHome" class="menu-page home-page active" data-menu-page-panel="home">
        <section class="profile-panel" aria-label="プロフィール">
          <input id="nameBox" maxlength="18" spellcheck="false" aria-label="名前" placeholder="name">
          <input id="cloneNameBox" maxlength="18" spellcheck="false" aria-label="別個体の名前" placeholder="name2">
        </section>

        <section class="online-panel" aria-label="オンライン">
          <div class="online-title">
            <span>オンライン2人</span>
            <span id="onlineStatus" class="online-status">オフライン</span>
          </div>
          <div class="online-controls">
            <button id="hostBtn" type="button">部屋を作る</button>
            <button id="joinBtn" type="button">部屋に入る</button>
            <button id="applyAnswerBtn" type="button">回答反映</button>
            <button id="disconnectBtn" type="button">切断</button>
            <button id="relayHostBtn" type="button">リレー作成</button>
            <button id="relayJoinBtn" type="button">リレー参加</button>
            <button id="spectateBtn" type="button">観戦</button>
          </div>
          <div class="online-fields">
            <input id="serverUrlBox" spellcheck="false" aria-label="リレーサーバー" placeholder="リレーURL">
            <input id="roomBox" spellcheck="false" aria-label="部屋名" placeholder="部屋名">
          </div>
          <textarea id="offerBox" spellcheck="false" placeholder="オファー"></textarea>
          <textarea id="answerBox" spellcheck="false" placeholder="回答"></textarea>
        </section>
      </div>

      <section id="menuPageSettings" class="menu-page settings-page" data-menu-page-panel="settings" aria-label="設定">
        <div class="view-panel">
        <div class="view-row"><span>表示</span><strong id="viewValue">100%</strong></div>
        <div class="view-controls">
          <button id="gameResetBtn" type="button">リセット</button>
        </div>
        <label class="setting-control">
          <span>カーソル線</span>
          <input id="cursorLineToggle" class="toggle-input" type="checkbox" checked aria-label="カーソルライン">
          <strong id="cursorLineValue" class="toggle-value">表示</strong>
        </label>
        <label class="setting-control">
          <span>N復活</span>
          <input id="nRespawnToggle" class="toggle-input" type="checkbox" checked aria-label="Nキーリスタート">
          <strong id="nRespawnValue" class="toggle-value">許可</strong>
        </label>
        <label class="setting-control">
          <span>操作色</span>
          <input id="activeColorToggle" class="toggle-input" type="checkbox" checked aria-label="操作中の細胞色">
          <strong id="activeColorValue" class="toggle-value">表示</strong>
        </label>
        <div class="keybind-title">キー</div>
        <div class="keybind-grid">
          <label class="keybind-control"><span>分裂</span><button type="button" data-keybind="split1"></button></label>
          <label class="keybind-control"><span>2分裂</span><button type="button" data-keybind="split2"></button></label>
          <label class="keybind-control"><span>3分裂</span><button type="button" data-keybind="split3"></button></label>
          <label class="keybind-control"><span>4分裂</span><button type="button" data-keybind="split4"></button></label>
          <label class="keybind-control"><span>粒</span><button type="button" data-keybind="eject"></button></label>
          <label class="keybind-control"><span>連射</span><button type="button" data-keybind="autoEject"></button></label>
          <label class="keybind-control"><span>別個体</span><button type="button" data-keybind="clone"></button></label>
          <label class="keybind-control"><span>復活</span><button type="button" data-keybind="respawn"></button></label>
          <label class="keybind-control"><span>Bot分裂</span><button type="button" data-keybind="botSplit"></button></label>
          <label class="keybind-control"><span>Bot粒</span><button type="button" data-keybind="botEject"></button></label>
        </div>
        <label class="setting-control">
          <span>ボット</span>
          <input id="botSlider" type="range" min="0" max="200" step="1" value="100" aria-label="ボット数">
          <strong id="botValue">100</strong>
          <input id="botMaxBox" class="max-input" type="number" min="1" step="1" value="200" aria-label="ボット上限">
        </label>
        <label class="setting-control">
          <span>行動</span>
          <select id="botModeSelect" class="mode-select" aria-label="ボット行動">
            <option value="hunt">小さい相手を狙う</option>
            <option value="chase">プレイヤーを追う</option>
            <option value="virus">とげを狙う</option>
            <option value="cursor">カーソルへ向かう</option>
          </select>
        </label>
        <label class="setting-control">
          <span>自然とげ</span>
          <input id="virusSlider" type="range" min="0" max="500" step="1" value="36" aria-label="自然発生とげ数">
          <strong id="virusValue">36</strong>
          <input id="virusMaxBox" class="max-input" type="number" min="1" step="1" value="500" aria-label="自然発生とげ上限">
        </label>
        <label class="setting-control">
          <span>ペレット</span>
          <input id="foodSlider" type="range" min="0" max="100000" step="100" value="1200" aria-label="ペレット数">
          <strong id="foodValue">1200</strong>
          <input id="foodMaxBox" class="max-input" type="number" min="100" step="100" value="100000" aria-label="ペレット上限">
        </label>
        <label class="setting-control">
          <span>初期マス</span>

      class SpatialHash {
        constructor(cellSize) {
          this.cellSize = cellSize;
          this.map = new Map();
        }

        clear() {
          this.map.clear();
        }

        key(cx, cy) {
          return `${cx},${cy}`;
        }

        insert(item) {
          const cx = Math.floor(item.x / this.cellSize);
          const cy = Math.floor(item.y / this.cellSize);
          const key = this.key(cx, cy);
          let bucket = this.map.get(key);
          if (!bucket) {
            bucket = [];
            this.map.set(key, bucket);
          }
          bucket.push(item);
        }

        query(x, y, range, out = []) {
          out.length = 0;
          const minX = Math.floor((x - range) / this.cellSize);
          const maxX = Math.floor((x + range) / this.cellSize);
          const minY = Math.floor((y - range) / this.cellSize);
          const maxY = Math.floor((y + range) / this.cellSize);
          for (let cy = minY; cy <= maxY; cy += 1) {
            for (let cx = minX; cx <= maxX; cx += 1) {
              const bucket = this.map.get(this.key(cx, cy));
              if (bucket) out.push(...bucket);
            }
          }
          return out;
        }

        queryRect(left, top, right, bottom, out = []) {
          out.length = 0;
          const minX = Math.floor(left / this.cellSize);
          const maxX = Math.floor(right / this.cellSize);
          const minY = Math.floor(top / this.cellSize);
          const maxY = Math.floor(bottom / this.cellSize);
          for (let cy = minY; cy <= maxY; cy += 1) {
            for (let cx = minX; cx <= maxX; cx += 1) {
              const bucket = this.map.get(this.key(cx, cy));
              if (bucket) out.push(...bucket);
            }
          }
          return out;
        }
      }

      function distSq(ax, ay, bx, by) {
        const dx = ax - bx;
        const dy = ay - by;
        return dx * dx + dy * dy;
      }

      function segmentPointDistSq(ax, ay, bx, by, px, py) {
        const dx = bx - ax;
        const dy = by - ay;
        const lengthSq = dx * dx + dy * dy;
        if (lengthSq < 0.0001) return distSq(ax, ay, px, py);
        const t = clamp(((px - ax) * dx + (py - ay) * dy) / lengthSq, 0, 1);
        const closestX = ax + dx * t;
        const closestY = ay + dy * t;
        return distSq(closestX, closestY, px, py);
      }

      function cross(ax, ay, bx, by) {
        return ax * by - ay * bx;
      }

      function segmentsIntersect(ax, ay, bx, by, cx, cy, dx, dy) {
        const rx = bx - ax;
        const ry = by - ay;
        const sx = dx - cx;
        const sy = dy - cy;
        const denominator = cross(rx, ry, sx, sy);
        const qpx = cx - ax;
        const qpy = cy - ay;

        if (Math.abs(denominator) < 0.000001) {
          if (Math.abs(cross(qpx, qpy, rx, ry)) > 0.000001) return false;
          const rr = rx * rx + ry * ry;
          if (rr < 0.000001) return segmentPointDistSq(cx, cy, dx, dy, ax, ay) < 0.000001;
          const t0 = ((cx - ax) * rx + (cy - ay) * ry) / rr;
          const t1 = ((dx - ax) * rx + (dy - ay) * ry) / rr;
          return Math.max(Math.min(t0, t1), 0) <= Math.min(Math.max(t0, t1), 1);
        }

        const t = cross(qpx, qpy, sx, sy) / denominator;
        const u = cross(qpx, qpy, rx, ry) / denominator;
        return t >= 0 && t <= 1 && u >= 0 && u <= 1;
      }

      function segmentSegmentDistSq(ax, ay, bx, by, cx, cy, dx, dy) {
        if (segmentsIntersect(ax, ay, bx, by, cx, cy, dx, dy)) return 0;
        return Math.min(
          segmentPointDistSq(ax, ay, bx, by, cx, cy),
          segmentPointDistSq(ax, ay, bx, by, dx, dy),
          segmentPointDistSq(cx, cy, dx, dy, ax, ay),
          segmentPointDistSq(cx, cy, dx, dy, bx, by)
        );
      }

      function circleOverlapArea(radiusA, radiusB, distance) {
        if (distance >= radiusA + radiusB) return 0;
        const smallerRadius = Math.min(radiusA, radiusB);
        if (distance <= Math.abs(radiusA - radiusB)) return Math.PI * smallerRadius * smallerRadius;
        const angleA = 2 * Math.acos(clamp(
          (distance * distance + radiusA * radiusA - radiusB * radiusB) / (2 * distance * radiusA),
          -1,
          1
        ));
        const angleB = 2 * Math.acos(clamp(
          (distance * distance + radiusB * radiusB - radiusA * radiusA) / (2 * distance * radiusB),
          -1,
          1
        ));
        return 0.5 * radiusA * radiusA * (angleA - Math.sin(angleA)) +
          0.5 * radiusB * radiusB * (angleB - Math.sin(angleB));
      }

      function hasHalfAreaOverlap(a, b, distance) {
        const overlapArea = circleOverlapArea(a.radius, b.radius, distance);
        const halfAreaA = Math.PI * a.radius * a.radius * 0.5;
        const halfAreaB = Math.PI * b.radius * b.radius * 0.5;
        return overlapArea >= halfAreaA || overlapArea >= halfAreaB;
      }

      function radiusFromMass(mass) {
        return Math.sqrt(Math.max(1, mass)) * 4;
      }

      function mergeDominantId(a, b, aMass = mergeAccountingMass(a), bMass = mergeAccountingMass(b)) {

      function hasMergeCancellation(actor, a, b, dominantId) {

        if (!actor.mergeDominantByPair) return false;
        const previousDominantId = actor.mergeDominantByPair.get(mergePairKey(a, b));
        return previousDominantId != null && previousDominantId !== dominantId;
      }

      function recordMergeAttempt(actor, a, b, dominantId) {
        if (dominantId == null) return;
        if (!actor.mergeDominantByPair) actor.mergeDominantByPair = new Map();
        actor.mergeDominantByPair.set(mergePairKey(a, b), dominantId);
        a.mergePartnerId = b.id;
        b.mergePartnerId = a.id;
        a.mergeDominantId = dominantId;
        b.mergeDominantId = dominantId;
      }

      function recordMergeObservation(actor, a, b, dominantId) {
        if (dominantId == null) return;
        if (!actor.mergeDominantByPair) actor.mergeDominantByPair = new Map();
        const key = mergePairKey(a, b);
        if (!actor.mergeDominantByPair.has(key)) {
          actor.mergeDominantByPair.set(key, dominantId);
        }
        const storedDominantId = actor.mergeDominantByPair.get(key);
        a.mergePartnerId = b.id;
        b.mergePartnerId = a.id;
        a.mergeDominantId = storedDominantId;
        b.mergeDominantId = storedDominantId;
      }

      function observeMergeCandidate(actor, a, b, distance, allowCancellation = false) {
        const dominantId = mergeDominantId(a, b);
        if (allowCancellation && hasMergeCancellation(actor, a, b, dominantId)) {
          resetCancelledMergeAttempt(actor, a, b, distance);
          return true;
        }
        recordMergeObservation(actor, a, b, dominantId);
        return false;
      }

      function clearMergeAttempt(actor, a, b) {
        if (!b) {
          a.mergePartnerId = null;
          a.mergeDominantId = null;
          return;
        }
        if (actor?.mergeDominantByPair) actor.mergeDominantByPair.delete(mergePairKey(a, b));
        if (a.mergePartnerId === b.id) {
          a.mergePartnerId = null;
          a.mergeDominantId = null;
        }
        if (b.mergePartnerId === a.id) {
          b.mergePartnerId = null;
          b.mergeDominantId = null;
        }
      }

      function mergePairKey(a, b) {
        return a.id < b.id ? `${a.id}:${b.id}` : `${b.id}:${a.id}`;
      }

      function mergePairCooling(actor, a, b) {
        if (!actor.mergeCancelUntil) return false;
        const until = actor.mergeCancelUntil.get(mergePairKey(a, b)) || 0;
        if (until > state.now) return true;
        if (until > 0) actor.mergeCancelUntil.delete(mergePairKey(a, b));
        return false;
      }

      function resetCancelledMergeAttempt(actor, a, b, distance) {
        const fallbackAngle = ((a.id * 12.9898 + b.id * 78.233) % TAU);
        const nx = distance < 0.001 ? Math.cos(fallbackAngle) : (b.x - a.x) / distance;
        const ny = distance < 0.001 ? Math.sin(fallbackAngle) : (b.y - a.y) / distance;
        const targetDistance = a.radius + b.radius + clamp((a.radius + b.radius) * 0.05, 12, 48);
        const overlap = Math.max(0, targetDistance - distance);
        const total = a.mass + b.mass;
        const aShare = b.mass / total;
        const bShare = a.mass / total;

        a.x -= nx * overlap * aShare;
        a.y -= ny * overlap * aShare;
        b.x += nx * overlap * bShare;
        b.y += ny * overlap * bShare;
        a.x = clamp(a.x, a.radius, WORLD_SIZE - a.radius);
        a.y = clamp(a.y, a.radius, WORLD_SIZE - a.radius);
        b.x = clamp(b.x, b.radius, WORLD_SIZE - b.radius);
        b.y = clamp(b.y, b.radius, WORLD_SIZE - b.radius);

        if (!actor.mergeCancelUntil) actor.mergeCancelUntil = new Map();
        actor.mergeCancelUntil.set(mergePairKey(a, b), state.now + MERGE_SWAP_RESET_TIME);
        clearMergeAttempt(actor, a, b);
      }

      function addMass(cell, amount) {
        cell.mass += amount;
        if (cell.mass > MAX_CELL_MASS) cell.capFramesLeft = MASS_CAP_SETTLE_FRAMES;
        refreshCell(cell);
      }

      function addConsumedMass(cell, amount) {
        const previousMass = cell.mass;
        addMass(cell, amount);
        const boostSpeed = Math.hypot(cell.boostX, cell.boostY);
        if (amount < MIN_CELL_MASS || (cell.splitBoostAge <= 0 && boostSpeed < 90)) return;

        const massDamping = Math.sqrt(Math.max(MIN_CELL_MASS, previousMass) / Math.max(previousMass, cell.mass));
        const boostDamping = clamp(massDamping * SPLIT_CATCH_MOMENTUM_SCALE, 0.42, 0.92);
        cell.boostX *= boostDamping;
        cell.boostY *= boostDamping;
        const velocityDamping = clamp(boostDamping + 0.1, 0.58, 0.96);
        cell.vx *= velocityDamping;
        cell.vy *= velocityDamping;
      }

      function normalized(dx, dy, fallbackX = 1, fallbackY = 0) {
        const length = Math.hypot(dx, dy);
        if (length < 0.001) return { x: fallbackX, y: fallbackY, length: 0 };
        return { x: dx / length, y: dy / length, length };
      }

      function darkenHex(hex, amount = 0.18) {
        const key = `${hex}:${amount}`;
        if (darkenCache.has(key)) return darkenCache.get(key);
        const clean = hex.replace("#", "");
        const n = parseInt(clean.length === 3 ? clean.replace(/(.)/g, "$1$1") : clean, 16);
        const r = Math.max(0, Math.round(((n >> 16) & 255) * (1 - amount)));
        const g = Math.max(0, Math.round(((n >> 8) & 255) * (1 - amount)));
        const b = Math.max(0, Math.round((n & 255) * (1 - amount)));
        const color = `rgb(${r}, ${g}, ${b})`;
        darkenCache.set(key, color);
        return color;
      }

      function consumeThreshold(eater, victim) {
        if (victim.ownerId && victim.mass >= UNCONSUMABLE_CELL_MASS) return false;
        if (eater.mass + 0.001 < victim.mass * CONSUME_MASS_RATIO) return false;
        if (eater.radius + 0.001 < victim.radius * CONSUME_RADIUS_RATIO) return false;
        const threshold = eater.radius - victim.radius * 0.22;
        return threshold > 0 ? threshold : 0;
      }

      function consumeThresholdWithMass(eater, victim, eaterMass) {
        const eaterRadius = radiusFromMass(eaterMass);
        if (victim.ownerId && victim.mass >= UNCONSUMABLE_CELL_MASS) return false;
        if (eaterMass + 0.001 < victim.mass * CONSUME_MASS_RATIO) return false;
        if (eaterRadius + 0.001 < victim.radius * CONSUME_RADIUS_RATIO) return false;
        const threshold = eaterRadius - victim.radius * 0.22;
        return threshold > 0 ? threshold : 0;
      }

      function canConsume(eater, victim) {
        const threshold = consumeThreshold(eater, victim);
        if (!threshold) return false;
        return distSq(eater.x, eater.y, victim.x, victim.y) <= threshold * threshold;
      }

      function hasSweepPath(cell) {
        return Boolean(cell.sweepActive && cell.sweepPoints && cell.sweepPoints.length > 1);
      }

      function sweptPointDistSq(cell, x, y) {
        const points = cell.sweepPoints;
        if (!points || points.length < 2) return distSq(cell.x, cell.y, x, y);
        let best = Infinity;
        for (let i = 1; i < points.length; i += 1) {
          const a = points[i - 1];
          const b = points[i];
          best = Math.min(best, segmentPointDistSq(a.x, a.y, b.x, b.y, x, y));
        }
        return best;
      }

      function sweptSegmentDistSq(aCell, bCell) {
        const aPoints = aCell.sweepPoints;
        const bPoints = bCell.sweepPoints;
        if (!aPoints || !bPoints || aPoints.length < 2 || bPoints.length < 2) {
          return distSq(aCell.x, aCell.y, bCell.x, bCell.y);
        }
        let best = Infinity;
        for (let ai = 1; ai < aPoints.length; ai += 1) {
          const a0 = aPoints[ai - 1];
          const a1 = aPoints[ai];
          for (let bi = 1; bi < bPoints.length; bi += 1) {
            const b0 = bPoints[bi - 1];
            const b1 = bPoints[bi];
            best = Math.min(best, segmentSegmentDistSq(a0.x, a0.y, a1.x, a1.y, b0.x, b0.y, b1.x, b1.y));
          }
        }
        return best;
      }

      function canConsumeSwept(eater, victim) {
        const threshold = consumeThreshold(eater, victim);
        if (!threshold) return false;
        const thresholdSq = threshold * threshold;
        if (distSq(eater.x, eater.y, victim.x, victim.y) <= thresholdSq) return true;

        const eaterSweeps = hasSweepPath(eater);
        const victimSweeps = hasSweepPath(victim);
        if (eaterSweeps && victimSweeps && sweptSegmentDistSq(eater, victim) <= thresholdSq) return true;
        if (eaterSweeps && sweptPointDistSq(eater, victim.x, victim.y) <= thresholdSq) return true;
        if (victimSweeps && sweptPointDistSq(victim, eater.x, eater.y) <= thresholdSq) return true;
        return false;
      }

      function findLocalActorSpawnPosition(actor, anchorActor, mass) {
        const radius = radiusFromMass(mass);
        const margin = Math.min(Math.max(radius + 24, 80), WORLD_SIZE * 0.5 - 1);
        const options = {
          avoidViruses: true,
          virusPadding: 130,
          cellPadding: 36
        };
        let best = null;
        let bestScore = -Infinity;

        if (anchorActor && liveCellCount(anchorActor) > 0) {
          let anchorCell = null;
          for (const cell of anchorActor.cells) {
            if (cell.dead) continue;
            if (!anchorCell || cell.radius > anchorCell.radius) anchorCell = cell;
          }
          if (anchorCell) {
            const angle = actor && actor.localClone ? 2.399963229728653 : 2.399963229728653 + Math.PI;
            const targetDistance = anchorCell.radius + radiusFromMass(2000);
            const minDistance = Math.max(anchorCell.radius + radius + 2, targetDistance);
            const overlapsAnyCell = (x, y) => {
              for (const otherActor of state.actors) {
                for (const otherCell of otherActor.cells) {
                  if (otherCell.dead) continue;
                  const gap = otherCell.radius + radius + 2;
                  if (distSq(x, y, otherCell.x, otherCell.y) < gap * gap) return true;
                }
              }
              return false;
            };
            for (let ring = 0; ring < 8; ring += 1) {
              const distance = minDistance + ring * Math.max(10, radius * 0.28);
              for (let i = 0; i < 16; i += 1) {
                const offset = i === 0 ? 0 : ((i % 2 === 0 ? 1 : -1) * Math.ceil(i / 2) * (TAU / 16));
                const nextAngle = angle + offset;
                const x = clamp(anchorCell.x + Math.cos(nextAngle) * distance, margin, WORLD_SIZE - margin);
                const y = clamp(anchorCell.y + Math.sin(nextAngle) * distance, margin, WORLD_SIZE - margin);
                if (!overlapsAnyCell(x, y)) return { x, y };
              }
            }
            for (let ring = 8; ring < 24; ring += 1) {
              const distance = minDistance + ring * Math.max(10, radius * 0.36);
              for (let i = 0; i < 20; i += 1) {
                const nextAngle = angle + (i / 20) * TAU;
                const x = clamp(anchorCell.x + Math.cos(nextAngle) * distance, margin, WORLD_SIZE - margin);
                const y = clamp(anchorCell.y + Math.sin(nextAngle) * distance, margin, WORLD_SIZE - margin);
                if (!overlapsAnyCell(x, y)) return { x, y };
              }
            }
          }
        }

        const consider = (x, y) => {
          const clampedX = clamp(x, margin, WORLD_SIZE - margin);
          const clampedY = clamp(y, margin, WORLD_SIZE - margin);
          const score = spawnClearanceScore(clampedX, clampedY, radius, options);
          if (score > bestScore) {
            bestScore = score;
            best = { x: clampedX, y: clampedY };
          }
        };

        if (anchorActor && liveCellCount(anchorActor) > 0) {
          const anchor = actorCenter(anchorActor);
          let anchorRadius = 0;
          for (const cell of anchorActor.cells) {
            if (!cell.dead) anchorRadius = Math.max(anchorRadius, cell.radius);
          }
          const baseAngle = actor && actor.localClone ? 2.399963229728653 : 2.399963229728653 + Math.PI;
          const massRange = clamp(anchorRadius * 0.75 + radius * 0.45, 24, anchorRadius * 2);
          const baseDistance = Math.min(anchorRadius * 3, radius + anchorRadius + options.cellPadding + massRange);
          for (let ring = 0; ring < 2; ring += 1) {
            const distance = Math.min(anchorRadius * 3, baseDistance + ring * Math.max(24, massRange * 0.32));
            for (let i = 0; i < 24; i += 1) {
              const angle = baseAngle + (i / 24) * TAU;
              consider(anchor.x + Math.cos(angle) * distance, anchor.y + Math.sin(angle) * distance);
            }
          }
        }

        const fallback = findOpenSpawnPosition(radius, margin, 96, options);
        consider(fallback.x, fallback.y);
        return best || fallback;
      }

      function spawnLocalActorBeside(actor, anchorActor) {

      function actorAutoEjectHeld(actor) {
        return Boolean(actor?.input?.keys?.has(state.keyBindings.autoEject) || actor?.input?.keys?.has(remoteAutoEjectKey));
      }

      function updateLocalActorInput() {
        if (state.spectating) return;
        const localActors = localHumanActors();
        if (!localActors.length) return;
        let actor = state.player && state.player.control === "local" && state.player.isHuman
          ? state.player
          : localActors[0];
        if (!actor.cells.length) {
          actor = localActors.find((candidate) => candidate.cells.length > 0) || actor;
          setActiveLocalActor(actor);
        }
        for (const actor of localActors) {
          if (actor !== state.player) {
            clearActorControlInput(actor, true);
            continue;
          }
          actor.input.targetX = state.input.mouseWorldX;
          actor.input.targetY = state.input.mouseWorldY;
          actor.input.keys.clear();
          if (state.input.keys.has(state.keyBindings.autoEject)) actor.input.keys.add(state.keyBindings.autoEject);
          if (state.input.ejectQueued) actor.input.ejectQueued = true;
          if (state.input.splitQueued) {
            actor.input.splitQueued = true;
            actor.input.splitCount += Math.max(1, state.input.splitCount || 1);
          }
        }
        if (state.input.ejectQueued) state.input.ejectQueued = false;
        if (state.input.splitQueued) {
          state.input.splitQueued = false;
          state.input.splitCount = 0;
        }
      }

      function toggleLocalCloneControl() {
        if (state.net.role === "client") {
          requestRemoteCloneToggle();
          return;
        }
        const main = primaryLocalActor();
        if (!main) return;
        if (liveCellCount(main) <= 0) {
          spawnLocalActorBeside(main, localCloneActor());
          setActiveLocalActor(main);
          return;
        }
        let clone = localCloneActor();
        if (!clone) {
          state.localCloneIndex = 1;
          clone = createActor("local-clone-1", localProfileName(true), botPalette[1 % botPalette.length], true, "local");
          clone.localClone = true;
          state.actors.push(clone);
          spawnLocalActorBeside(clone, main);
        }
        if (liveCellCount(clone) <= 0) {
          spawnLocalActorBeside(clone, main);
          setActiveLocalActor(clone);
          return;
        }
        const nextActor = state.player === clone ? main : clone;
        setActiveLocalActor(nextActor);
        state.net.lastSnapshotSend = -100;
      }

      function setSpectating(enabled) {
        state.spectating = Boolean(enabled);
        spectateBtn.textContent = state.spectating ? "復帰" : "観戦";
        if (!state.spectating) return;
        state.input.keys.clear();
        state.input.splitQueued = false;
        state.input.splitCount = 0;
        state.input.ejectQueued = false;
        state.input.respawnQueued = false;
        state.input.botSplitQueued = false;
        state.input.botEjectQueued = false;
        for (const actor of localHumanActors()) clearActorControlInput(actor);
      }

      function toggleSpectating() {
        setSpectating(!state.spectating);
      }

      function createBotActor() {
        const index = state.nextBotIndex;
        state.nextBotIndex += 1;
        const botName = `${botNames[index % botNames.length]} ${String(index + 1).padStart(2, "0")}`;
        const bot = createActor(`bot-${index}`, botName, botPalette[index % botPalette.length]);
        state.actors.push(bot);
        spawnActor(bot, BOT_SPAWN_MASS);
        return bot;
      }

      function ensureBotPopulation() {
        const target = state.settings.botTarget;
        let botCount = 0;
        for (const actor of state.actors) {
          if (!actor.isHuman) botCount += 1;
        }
        for (let i = state.actors.length - 1; i >= 0 && botCount > target; i -= 1) {
          if (state.actors[i].isHuman) continue;
          state.actors.splice(i, 1);
          botCount -= 1;
        }
        while (botCount < target) {
          createBotActor();
          botCount += 1;
        }
      }

      function createCell(actor, x, y, mass) {
        const cell = {
          id: nextId(),
          actor,
          ownerId: actor.id,
          x: clamp(x, 0, WORLD_SIZE),
          y: clamp(y, 0, WORLD_SIZE),
          mass: Math.max(MIN_CELL_MASS, mass),
          radius: 1,
          vx: 0,
          vy: 0,
          boostX: 0,
          boostY: 0,
          faceX: 1,
          faceY: 0,
          sweepActive: false,
          sweepPoints: null,
          sweepFromX: x,
          sweepFromY: y,
          sweepToX: x,
          sweepToY: y,
          cooldown: 0,
          mergeReadyAt: 0,
          capFramesLeft: mass > MAX_CELL_MASS ? MASS_CAP_SETTLE_FRAMES : 0,
          birthAge: 1,
          birthDuration: 0,
          birthX: x,
          birthY: y,
          birthScale: 1,
          fragmentAge: 0,
          splitBoostAge: 0,
          splitHoldAge: 0,
          pendingBoostX: 0,
          pendingBoostY: 0,
          separationGraceUntil: 0,
          splitRecoilFrame: -1,
          splitRecoilApplied: 0,
          mergePartnerId: null,
          mergeDominantId: null,
          virusCooldown: 0,
          mergeVirusWindow: 0,
          mergeOverflowMass: Math.max(0, mass - MAX_CELL_MASS),
          mergeBurstPieces: 1,
          mergeBurstTotal: mass,
          splitPriority: 0,
          targetX: x,
          targetY: y,
          dead: false
        };
        refreshCell(cell);
        return cell;
      }

      function startCellBirth(cell, originX, originY, duration = 0.16, scale = 0.08) {
        cell.birthAge = 0;
        cell.birthDuration = duration;
        cell.birthX = originX;
        cell.birthY = originY;
        cell.birthScale = scale;
      }

      function capBoost(cell, maxSpeed) {
        const speed = Math.hypot(cell.boostX, cell.boostY);
        if (speed <= maxSpeed || speed < 0.001) return;
        const scale = maxSpeed / speed;
        cell.boostX *= scale;
        cell.boostY *= scale;
      }

      function capVelocity(cell, maxSpeed) {
        const speed = Math.hypot(cell.vx, cell.vy);
        if (speed <= maxSpeed || speed < 0.001) return;
        const scale = maxSpeed / speed;
        cell.vx *= scale;
        cell.vy *= scale;
      }

      function virusFragmentAngles(count) {
        const angles = [];
        const step = TAU / Math.max(1, count);
        const offset = rand(0, TAU);
        for (let i = 0; i < count; i += 1) {
          angles.push(offset + (i + rand(0.12, 0.88)) * step);
        }
        for (let i = angles.length - 1; i > 0; i -= 1) {
          const j = Math.floor(rand(0, i + 1));
          const tmp = angles[i];
          angles[i] = angles[j];
          angles[j] = tmp;
        }
        return angles;
      }

      function mergeBurstMasses(total, count) {
        if (count <= 1) return [total];
        const parentMass = Math.min(MAX_CELL_MASS, total);
        const overflow = Math.max(0, total - parentMass);
        const childCount = count - 1;
        if (overflow <= 0 || childCount <= 0) return [total];

        const masses = [parentMass];
        let remainingOverflow = overflow;
        for (let i = 0; i < childCount; i += 1) {
          const remainingChildren = childCount - i;
          const minAllowed = Math.max(MIN_CELL_MASS, remainingOverflow - MAX_CELL_MASS * (remainingChildren - 1));
          const maxAllowed = Math.min(MAX_CELL_MASS, remainingOverflow - MIN_CELL_MASS * (remainingChildren - 1));
          const ideal = Math.min(MAX_CELL_MASS, remainingOverflow / remainingChildren);
          const mass = i === childCount - 1
            ? remainingOverflow
            : clamp(
                ideal * rand(0.9, 1.1),
                minAllowed,
                maxAllowed
              );
          masses.push(mass);
          remainingOverflow -= mass;
        }
        return masses;
      }

      function virusBurstMasses(total, count) {
        if (count <= 1) return [total];
        const weights = [];
        const mediumCount = Math.min(3, Math.max(1, count - 2));
        for (let i = 0; i < count; i += 1) {
          if (i === 0) weights.push(rand(2.0, 2.35));
          else if (i <= mediumCount) weights.push(rand(1.18, 1.48));
          else weights.push(rand(0.38, 0.62));
        }

        const weightTotal = weights.reduce((sum, weight) => sum + weight, 0);
        const masses = weights.map((weight) => Math.max(MIN_CELL_MASS, total * weight / weightTotal));
        let massTotal = masses.reduce((sum, mass) => sum + mass, 0);
        for (let guard = 0; guard < 3 && Math.abs(massTotal - total) > 0.001; guard += 1) {
          const adjustable = masses
            .map((mass, index) => ({ mass, index }))
            .filter((entry) => entry.mass > MIN_CELL_MASS + 0.001);
          if (!adjustable.length) break;
          const share = (total - massTotal) / adjustable.length;
          for (const entry of adjustable) {
            masses[entry.index] = Math.max(MIN_CELL_MASS, masses[entry.index] + share);
          }
          massTotal = masses.reduce((sum, mass) => sum + mass, 0);
        }

        masses[0] = Math.max(MIN_CELL_MASS, masses[0] + total - massTotal);

        const sorted = masses.sort((a, b) => b - a);
        if (sorted.length <= 2) return sorted;

        const centerIndex = Math.min(sorted.length - 1, 2);
        const centerMass = sorted[centerIndex];
        sorted.splice(centerIndex, 1);
        return [centerMass, ...sorted];
      }

      function totalMass(actor) {
        let total = 0;
        for (const cell of actor.cells) total += cell.mass;
        return total;
      }

      function totalServerNutrients() {
        let total = 0;
        for (const actor of state.actors) total += totalMass(actor);
        for (const food of state.foods) if (!food.dead) total += food.mass;
        for (const feed of state.feeds) if (!feed.dead) total += feed.mass;
        for (const virus of state.viruses) if (!virus.dead) total += virus.mass;
        return total;
      }

      function actorCenter(actor, useRender = false) {
        let mass = 0;
        let x = 0;
        let y = 0;
        for (const cell of actor.cells) {
          const cellX = useRender && Number.isFinite(cell.renderX) ? cell.renderX : cell.x;
          const cellY = useRender && Number.isFinite(cell.renderY) ? cell.renderY : cell.y;
          mass += cell.mass;
          x += cellX * cell.mass;
          y += cellY * cell.mass;
        }
        if (mass <= 0) return { x: WORLD_SIZE * 0.5, y: WORLD_SIZE * 0.5, mass: 0 };
        return { x: x / mass, y: y / mass, mass };
      }

      function sharedLocalViewCenter(useRender = false) {
        const actors = liveLocalHumanActors();
        if (!actors.length) {
          return { x: WORLD_SIZE * 0.5, y: WORLD_SIZE * 0.5, mass: 0, cellCount: 0, spread: 0 };
        }
        if (actors.length === 1) {
          const center = actorCenter(actors[0], useRender);
          center.cellCount = liveCellCount(actors[0]);
          center.spread = 0;
          return center;
        }

        const samples = [];
        let mass = 0;
        let x = 0;
        let y = 0;
        for (const actor of actors) {
          for (const cell of actor.cells) {
            if (cell.dead) continue;
            const cellX = useRender && Number.isFinite(cell.renderX) ? cell.renderX : cell.x;
            const cellY = useRender && Number.isFinite(cell.renderY) ? cell.renderY : cell.y;
            samples.push({ x: cellX, y: cellY, radius: cell.radius });
            mass += cell.mass;
            x += cellX * cell.mass;
            y += cellY * cell.mass;
          }
        }
        if (mass <= 0) {
          return { x: WORLD_SIZE * 0.5, y: WORLD_SIZE * 0.5, mass: 0, cellCount: 0, spread: 0 };
        }
        const centerX = x / mass;
        const centerY = y / mass;
        let spread = 0;
        for (const sample of samples) {
          spread = Math.max(spread, Math.hypot(sample.x - centerX, sample.y - centerY) + sample.radius);
        }
        return { x: centerX, y: centerY, mass, cellCount: samples.length, spread };
      }

      function allCells(out = []) {
        out.length = 0;
        for (const actor of state.actors) {
          for (const cell of actor.cells) {
            if (!cell.dead) out.push(cell);
          }
        }
        return out;
      }

      function liveCellCount(actor) {
        let count = 0;
        for (const cell of actor.cells) {
          if (!cell.dead) count += 1;
        }
        return count;
      }

      function refreshNextSplitPriority(actor) {
        let maxPriority = 0;
        for (const cell of actor.cells) {
          if (Number.isFinite(cell.splitPriority)) maxPriority = Math.max(maxPriority, cell.splitPriority);
        }
        actor.nextSplitPriority = Math.max(actor.nextSplitPriority || 1, maxPriority + 1);
      }

      function assignSplitPriority(actor, cell) {
        if (Number.isFinite(cell.splitPriority) && cell.splitPriority > 0) return cell.splitPriority;
        refreshNextSplitPriority(actor);
        cell.splitPriority = actor.nextSplitPriority;
        actor.nextSplitPriority += 1;
        return cell.splitPriority;
      }

      function mergeAccountingMass(cell) {
        return cell.mass;
      }

      function mergeVirusHitRadius(cell) {
        return radiusFromMass(mergeVirusHitMass(cell));
      }

      function mergeVirusHitMass(cell) {
        const burstMass = cell.mergeVirusWindow > 0 ? Math.max(cell.mergeBurstTotal || 0, cell.mass) : cell.mass;
        return clamp(burstMass, cell.mass, MAX_MERGE_VIRUS_HIT_MASS);
      }

      function canConsumeVirus(cell, virus) {
        const hitMass = mergeVirusHitMass(cell);
        const threshold = consumeThresholdWithMass(cell, virus, hitMass);
        if (!threshold) return false;
        const thresholdSq = threshold * threshold;
        if (distSq(cell.x, cell.y, virus.x, virus.y) <= thresholdSq) return true;
        return hasSweepPath(cell) && sweptPointDistSq(cell, virus.x, virus.y) <= thresholdSq;
      }

      function virusCollisionPriority(cell) {
        if (cell.mass > MAX_CELL_MASS) {
          return 100000000 + cell.mass;
        }
        if (cell.mergeVirusWindow > 0) {
          return 50000000 + cell.mass;
        }
        if (cell.fragmentAge > 0) {
          return cell.mass - 1000000;
        }
        return cell.mass;
      }

      function randomPosition(padding = 80) {
        return {
          x: rand(padding, WORLD_SIZE - padding),
          y: rand(padding, WORLD_SIZE - padding)
        };
      }

      function spawnClearanceScore(x, y, radius, options = {}) {
        let score = Math.min(
          x - radius,
          y - radius,
          WORLD_SIZE - radius - x,
          WORLD_SIZE - radius - y
        );

        if (options.avoidX != null && options.avoidY != null) {
          score = Math.min(score, Math.sqrt(distSq(x, y, options.avoidX, options.avoidY)) - (options.avoidRadius || 0));
        }

        const cellPadding = options.cellPadding || 0;
        for (const actor of state.actors) {
          for (const cell of actor.cells) {
            if (cell.dead) continue;
            score = Math.min(score, Math.sqrt(distSq(x, y, cell.x, cell.y)) - radius - cell.radius - cellPadding);
          }
        }

        if (options.avoidViruses) {
          const virusPadding = options.virusPadding || 0;
          for (const virus of state.viruses) {
            if (virus.dead) continue;
            score = Math.min(score, Math.sqrt(distSq(x, y, virus.x, virus.y)) - radius - virus.radius - virusPadding);
          }
        }

        if (options.avoidFoods) {
          const foodPadding = options.foodPadding || 0;
          for (const food of state.foods) {
            if (food.dead) continue;
            score = Math.min(score, Math.sqrt(distSq(x, y, food.x, food.y)) - radius - food.radius - foodPadding);
          }
        }

        return score;
      }

      function findOpenSpawnPosition(radius, padding = 80, attempts = 24, options = {}) {
        let best = randomPosition(padding);
        let bestScore = -Infinity;
        for (let attempt = 0; attempt < attempts; attempt += 1) {
          const pos = randomPosition(padding);
          const score = spawnClearanceScore(pos.x, pos.y, radius, options);
          if (score > bestScore) {
            best = pos;
            bestScore = score;
          }
        }
        return best;
      }

      function spawnActor(actor, mass = 70, preferredX = null, preferredY = null) {
        const pos = preferredX == null ? findSpawnPosition(mass) : { x: preferredX, y: preferredY };
        actor.color = randomActorColor(actor.color);
        actor.cells.length = 0;
        actor.respawns += 1;
        actor.respawnAt = 0;
        actor.nextSplitPriority = 1;
        actor.lastSplit = -100;
        actor.lastSplitFrame = -1;
        actor.lastEject = -100;
        actor.input.splitQueued = false;
        actor.input.splitCount = 0;
        actor.input.splitLockActive = false;
        const cell = createCell(actor, pos.x, pos.y, mass);
        cell.splitPriority = actor.nextSplitPriority;
        actor.nextSplitPriority += 1;
        actor.cells.push(cell);
        actor.input.targetX = pos.x;
        actor.input.targetY = pos.y;
      }

      function findSpawnPosition(mass) {
        const radius = radiusFromMass(mass);
        return findOpenSpawnPosition(radius, 320, 90, {
          avoidViruses: true,
          virusPadding: 130,
          cellPadding: 180
        });
      }

      function createFood() {
        const mass = rand(1.2, 3.4);
        const radius = radiusFromMass(mass);
        const crowded = state.foods.length > FOOD_AVOID_LIMIT;
        const pos = crowded
          ? findOpenSpawnPosition(radius, 20, 4, {
              avoidViruses: true,
              virusPadding: 18,
              cellPadding: 50
            })
          : findOpenSpawnPosition(radius, 20, 10, {
              avoidViruses: true,
              avoidFoods: true,
              virusPadding: 24,
              foodPadding: 4,
              cellPadding: 60
            });
        return {
          id: nextId(),
          type: "food",
          x: pos.x,
          y: pos.y,
          mass,
          radius,
          color: foodPalette[Math.floor(Math.random() * foodPalette.length)],
          dead: false
        };
      }

      function addFood() {
        const food = createFood();
        state.foods.push(food);
        if (!state.foodGridDirty) foodGrid.insert(food);
        return food;
      }

      function createVirus(x = null, y = null, natural = true) {
        const radius = radiusFromMass(VIRUS_MASS);
        const pos = x == null
          ? findOpenSpawnPosition(radius, 180, 16, {
              avoidViruses: true,
              virusPadding: 28,
              cellPadding: 120
            })
          : { x, y };
        return {
          id: nextId(),
          type: "virus",
          x: clamp(pos.x, 60, WORLD_SIZE - 60),
          y: clamp(pos.y, 60, WORLD_SIZE - 60),
          mass: VIRUS_MASS,
          radius,
          vx: 0,
          vy: 0,
          feedCount: 0,
          natural,
          dead: false
        };
      }

      function spawnVirusSafely(avoidX = null, avoidY = null) {
        const radius = radiusFromMass(VIRUS_MASS);
        const pos = findOpenSpawnPosition(radius, 180, 18, {
          avoidViruses: true,
          avoidX,
          avoidY,
          avoidRadius: avoidX == null ? 0 : 560,
          virusPadding: 32,
          cellPadding: 130
        });
        return createVirus(pos.x, pos.y);
      }

      function isNaturalVirus(virus) {
        return virus.natural !== false;
      }

      function liveVirusCount() {
        let count = 0;
        for (const virus of state.viruses) {
          if (!virus.dead) count += 1;
        }
        return count;
      }

      function trimNaturalViruses(limit) {
        let totalCount = liveVirusCount();
        let changed = false;
        state.viruses = state.viruses.filter((virus) => {
          if (virus.dead) {
            changed = true;
            return false;
          }
          if (!isNaturalVirus(virus)) return true;
          if (totalCount <= limit) return true;
          changed = true;
          totalCount -= 1;
          return false;
        });
        return changed;
      }

      function createFeed(x, y, dirX, dirY, color, ownerId, speed = DEFAULT_EJECT_SPEED, mass = DEFAULT_EJECT_MASS) {
        const feedMass = Math.max(5, Number(mass) || DEFAULT_EJECT_MASS);
        const feed = {
          id: nextId(),
          type: "feed",
          x: clamp(x, 0, WORLD_SIZE),
          y: clamp(y, 0, WORLD_SIZE),
          mass: feedMass,
          radius: radiusFromMass(feedMass),
          vx: dirX * speed,
          vy: dirY * speed,
          age: 0,
          color,
          ownerId,
          dead: false
        };
        state.feeds.push(feed);
        return feed;
      }

      function rebuildFoodGridOnly() {
        foodGrid.clear();
        for (const food of state.foods) if (!food.dead) foodGrid.insert(food);
        state.foodGridDirty = false;
      }

      function rebuildSpatialHashes() {
        feedGrid.clear();
        virusGrid.clear();
        cellGrid.clear();
        if (state.foodGridDirty) {
          rebuildFoodGridOnly();
        }
        for (const feed of state.feeds) if (!feed.dead) feedGrid.insert(feed);
        for (const virus of state.viruses) if (!virus.dead) virusGrid.insert(virus);
        for (const actor of state.actors) {
          for (const cell of actor.cells) {
            if (!cell.dead) cellGrid.insert(cell);
          }
        }
      }

      function screenToWorld(x, y) {
        return {
          x: state.camera.x + (x - state.width * 0.5) / state.camera.zoom,
          y: state.camera.y + (y - state.height * 0.5) / state.camera.zoom
        };
      }

      function updateMouseWorld() {
        const world = screenToWorld(state.input.mouseX, state.input.mouseY);
        state.input.mouseWorldX = clamp(world.x, 0, WORLD_SIZE);
        state.input.mouseWorldY = clamp(world.y, 0, WORLD_SIZE);
      }

      function syncPointerTarget() {
        updateMouseWorld();
        const actor = state.player && receivesPlayerInput(state.player) ? state.player : actorById(state.input.activeActorId);
        if (!actor || !receivesPlayerInput(actor)) return;
        actor.input.targetX = state.input.mouseWorldX;
        actor.input.targetY = state.input.mouseWorldY;
        state.net.lastInputSend = -100;
      }

      function actorAimDirection(actor) {
        const center = actorCenter(actor);
        const n = normalized(
          actor.input.targetX - center.x,
          actor.input.targetY - center.y,
          actor.input.lastAimX,
          actor.input.lastAimY
        );
        if (n.length > 0.001) {
          actor.input.lastAimX = n.x;
          actor.input.lastAimY = n.y;
        }
        return n;
      }

      function splitImpulse(radius) {
        return clamp(285 + radius * 0.28, 300, 500) * splitSpeedScale();
      }

      function splitSpeedScale() {
        return Math.max(0.05, state.settings.splitSpeed / 100);
      }

      function minSplitBoost() {
        return 0;
      }

      function gameSpeedScale() {
        return Math.max(0.05, state.settings.gameSpeed);
      }

      function splitRecoilDistance(radius) {
        const recoil = state.settings.splitRecoil;
        if (recoil <= 0) return 0;
        const requested = Math.max(0, radius * (recoil / 100));
        return Math.min(requested, 4 + radius * 0.01);
      }

      function applySplitRecoil(cell, dirX, dirY, distance) {
        if (distance <= 0) return;
        if (cell.splitRecoilFrame !== state.frameIndex) {
          cell.splitRecoilFrame = state.frameIndex;
          cell.splitRecoilApplied = 0;
        }
        const remaining = Math.max(0, distance - cell.splitRecoilApplied);
        if (remaining <= 0) return;
        cell.x = clamp(cell.x - dirX * remaining, cell.radius, WORLD_SIZE - cell.radius);
        cell.y = clamp(cell.y - dirY * remaining, cell.radius, WORLD_SIZE - cell.radius);
        cell.splitRecoilApplied += remaining;
      }

      function ejectInterval() {
        return 1 / Math.max(1, state.settings.ejectRate);
      }

      function splitCell(actor, source, dirX, dirY, targetX = null, targetY = null, applyRecoil = true) {
        if (liveCellCount(actor) >= MAX_CELLS) return null;
        if (source.dead || source.mass < MIN_SPLIT_SOURCE_MASS) return null;
        assignSplitPriority(actor, source);

        if (targetX != null && targetY != null) {
          const aim = normalized(targetX - source.x, targetY - source.y, dirX, dirY);
          dirX = aim.x;
          dirY = aim.y;
        }

        const childMass = source.mass * 0.5;
        const remaining = source.mass - childMass;
        if (childMass < MIN_CELL_MASS || remaining < MIN_CELL_MASS) return null;

        source.mass = remaining;
        refreshCell(source);
        setMergeCooldown(source);

        const childRadius = radiusFromMass(childMass);
        const originX = source.x;
        const originY = source.y;
        const spawnOffset = (source.radius + childRadius) * SPLIT_SPAWN_OFFSET_RATIO;
        const spawnX = originX + dirX * spawnOffset;
        const spawnY = originY + dirY * spawnOffset;
        const child = createCell(
          actor,
          clamp(spawnX, childRadius, WORLD_SIZE - childRadius),
          clamp(spawnY, childRadius, WORLD_SIZE - childRadius),
          childMass
        );
        child.vx = source.vx;
        child.vy = source.vy;
        source.faceX = dirX;
        source.faceY = dirY;
        child.faceX = dirX;
        child.faceY = dirY;
        const impulse = splitImpulse(child.radius);
        child.pendingBoostX = dirX * impulse;
        child.pendingBoostY = dirY * impulse;
        child.splitHoldAge = SPLIT_HOLD_DURATION;
        child.boostX = 0;
        child.boostY = 0;
        child.splitBoostAge = SPLIT_BOOST_DURATION;
        child.splitPriority = actor.nextSplitPriority;
        actor.nextSplitPriority += 1;
        source.separationGraceUntil = state.now + 0.14;
        child.separationGraceUntil = state.now + 0.14;
        source.vx *= 0.24;
        source.vy *= 0.24;
        source.boostX *= 0.02;
        source.boostY *= 0.02;
        if (applyRecoil) applySplitRecoil(source, dirX, dirY, splitRecoilDistance(child.radius));
        if (targetX != null && targetY != null) {
          source.targetX = targetX;
          source.targetY = targetY;
          child.targetX = targetX;
          child.targetY = targetY;
        }
        setMergeCooldown(child);
        startCellBirth(child, originX, originY, 0.16, 0.35);
        actor.cells.push(child);
        return child;
      }

      function splitActor(actor, dirX, dirY, now, interval, targetX = null, targetY = null) {
        if (liveCellCount(actor) >= MAX_CELLS) return false;
        for (const cell of actor.cells) {
          if (!cell.dead) assignSplitPriority(actor, cell);
        }

        // Split order is stable by birth number; each source still aims along its own cursor line.
        const candidates = actor.cells
          .slice()
          .sort((a, b) => {
            const priorityDiff = (a.splitPriority || 0) - (b.splitPriority || 0);
            if (priorityDiff !== 0) return priorityDiff;
            return a.id - b.id;
        });
        let didSplit = false;
        let recoilUsed = false;
        const canUseRecoil = now - actor.lastSplitRecoilAt >= SPLIT_RECOIL_COOLDOWN;
        for (const cell of candidates) {
          if (liveCellCount(actor) >= MAX_CELLS) break;
          const shouldRecoil = canUseRecoil && !recoilUsed;
          const child = splitCell(actor, cell, dirX, dirY, targetX, targetY, shouldRecoil);
          if (child) {
            didSplit = true;
            if (shouldRecoil) {
              recoilUsed = true;
              actor.lastSplitRecoilAt = now;
            }
          }
        }
        if (didSplit) {
          actor.lastSplit = now;
          actor.lastSplitFrame = state.frameIndex;
          sendSplitRenderEvent(actor);
        }
        return didSplit;
      }

      function sendSplitRenderEvent(actor) {
        if (state.net.role !== "host" || !state.net.connected || !actor.isHuman) return;
        netSend({
          t: "splitEvent",
          actor: serializeActor(actor)
        });
      }

      function ejectMass(actor, now, allCells = false) {
        if (now - actor.lastEject < ejectInterval()) return false;
        const ejectMass = state.settings.ejectMass;
        const ejectCost = ejectMass + 1;
        const eligible = actor.cells.filter((candidate) => !candidate.dead && candidate.mass - ejectCost >= MIN_SPLIT_SOURCE_MASS);
        if (!eligible.length) return false;
        if (allCells) {
          let emitted = false;
          for (const cell of eligible) {
            if (emitFeedFromCell(actor, cell, ejectMass, ejectCost)) emitted = true;
          }
          if (emitted) actor.lastEject = now;
          return emitted;
        }

        actor.nextEjectIndex %= Math.max(1, actor.cells.length);
        let cell = null;
        for (let offset = 0; offset < actor.cells.length; offset += 1) {
          const candidate = actor.cells[(actor.nextEjectIndex + offset) % actor.cells.length];
          if (!candidate.dead && candidate.mass - ejectCost >= MIN_SPLIT_SOURCE_MASS) {
            cell = candidate;
            actor.nextEjectIndex = (actor.cells.indexOf(candidate) + 1) % actor.cells.length;
            break;
          }
        }
        if (!cell) cell = eligible[0];
        if (!cell) return false;

        const emitted = emitFeedFromCell(actor, cell, ejectMass, ejectCost);
        if (emitted) actor.lastEject = now;
        return emitted;
      }

      function emitFeedFromCell(actor, cell, ejectMass, ejectCost) {
        const targetX = isPlayerControlled(actor) ? actor.input.targetX : cell.targetX;
        const targetY = isPlayerControlled(actor) ? actor.input.targetY : cell.targetY;
        const n = normalized(targetX - cell.x, targetY - cell.y, actor.input.lastAimX, actor.input.lastAimY);
        if (n.length > 0.001) {
          actor.input.lastAimX = n.x;
          actor.input.lastAimY = n.y;
        }
        cell.mass -= ejectCost;
        refreshCell(cell);
        const startX = cell.x + n.x * (cell.radius + 18);
        const startY = cell.y + n.y * (cell.radius + 18);
        const feed = createFeed(startX, startY, n.x, n.y, actor.color, actor.id, state.settings.ejectSpeed, ejectMass);
        feed.vx += cell.vx * 0.25 + cell.boostX * 0.08;
        feed.vy += cell.vy * 0.25 + cell.boostY * 0.08;
        return true;
      }

      function scatterMass(cell, ratio, preferredX = 0, preferredY = 0) {
        const removable = Math.max(0, cell.mass - MIN_SPLIT_SOURCE_MASS);
        const loss = Math.min(removable, cell.mass * ratio);
        const count = Math.min(14, Math.floor(loss / DEFAULT_EJECT_MASS));
        if (count <= 0) return;

        const base = normalized(preferredX, preferredY, 1, 0);
        let removed = 0;
        for (let i = 0; i < count; i += 1) {
          const angle = Math.atan2(base.y, base.x) + rand(-1.35, 1.35) + i * 0.21;
          const dirX = Math.cos(angle);
          const dirY = Math.sin(angle);
          const feed = createFeed(
            cell.x + dirX * (cell.radius + 10),
            cell.y + dirY * (cell.radius + 10),
            dirX,
            dirY,
            cell.actor.color,
            cell.ownerId,
            rand(520, 820)
          );
          feed.age = 0.18;
          removed += DEFAULT_EJECT_MASS;
        }
        cell.mass = Math.max(MIN_CELL_MASS, cell.mass - removed);
        refreshCell(cell);
      }

      function explodeCellOnVirus(actor, cell, virus) {
        const liveCells = liveCellCount(actor);
        if (liveCells >= MAX_CELLS) {
          return;
        }

        const originalMass = mergeVirusHitMass(cell);
        const total = originalMass + virus.mass;
        const slots = MAX_CELLS - liveCells + 1;
        const originX = cell.x;
        const originY = cell.y;

        const desiredPieces = clamp(Math.floor(total / MIN_SPLIT_SOURCE_MASS), 4, 16);
        const pieces = Math.min(slots, desiredPieces);
        if (pieces <= 1) {
          scatterMass(cell, 0.22, cell.x - virus.x, cell.y - virus.y);
          return;
        }

        const pieceMasses = virusBurstMasses(total, pieces);
        cell.mass = pieceMasses[0];
        refreshCell(cell);
        setMergeCooldown(cell);
        cell.vx *= 0.16;
        cell.vy *= 0.16;
        cell.boostX *= 0.08;
        cell.boostY *= 0.08;
        cell.virusCooldown = 0.42;
        capBoost(cell, 75);
        startCellBirth(cell, originX, originY, 0.1, 0.82);

        const baseAngle = Math.atan2(cell.y - virus.y, cell.x - virus.x);
        for (let i = 1; i < pieces; i += 1) {
          const spreadIndex = i - 1;
          const angle = baseAngle + (TAU * spreadIndex / Math.max(1, pieces - 1)) + rand(-0.16, 0.16);
          const dirX = Math.cos(angle);
          const dirY = Math.sin(angle);
          const childMass = pieceMasses[i];
          const childRadius = radiusFromMass(childMass);
          const spawnDistance = cell.radius + childRadius * rand(0.92, 1.16) + rand(8, 42);
          const child = createCell(
            actor,
            clamp(originX + dirX * spawnDistance, childRadius, WORLD_SIZE - childRadius),
            clamp(originY + dirY * spawnDistance, childRadius, WORLD_SIZE - childRadius),
            childMass
          );
          child.vx = cell.vx * 0.06;
          child.vy = cell.vy * 0.06;
          const massDrag = clamp(Math.sqrt(72 / Math.max(20, child.mass)), 0.58, 1.0);
          const burst = rand(760, 1080) * massDrag;
          child.boostX = dirX * burst;
          child.boostY = dirY * burst;
          capBoost(child, 980);
          child.fragmentAge = VIRUS_FRAGMENT_LIFE;
          child.virusCooldown = 0.42;
          setMergeCooldown(child);
          startCellBirth(child, originX, originY, 0.18, 0.04);
          actor.cells.push(child);
        }
        return;
      }

      function updateBotAI(bot, dt, now) {
        bot.aiTimer -= dt;
        if (bot.aiTimer > 0) return;
        bot.aiTimer = rand(0.16, 0.32);

        const center = actorCenter(bot);
        if (distSq(center.x, center.y, bot.wanderX, bot.wanderY) < 160 * 160 || Math.random() < 0.03) {
          bot.wanderX = rand(260, WORLD_SIZE - 260);
          bot.wanderY = rand(260, WORLD_SIZE - 260);
        }

        for (const cell of bot.cells) {
          if (state.settings.botMode === "cursor") {
            cell.targetX = state.input.mouseWorldX;
            cell.targetY = state.input.mouseWorldY;
            continue;
          }

          if (state.settings.botMode === "chase") {
            const target = nearestHumanCell(cell, bot.id);
            if (target) {
              cell.targetX = target.x;
              cell.targetY = target.y;
            } else {
              cell.targetX = bot.wanderX;
              cell.targetY = bot.wanderY;
            }
            continue;
          }

          if (state.settings.botMode === "virus") {
            const virus = nearestEdibleVirus(cell);
            if (virus) {
              cell.targetX = virus.x;
              cell.targetY = virus.y;
              continue;
            }
          }

          let bestPrey = null;
          let bestPreyScore = 0;
          let avoidCellX = 0;
          let avoidCellY = 0;
          let avoidCellPower = 0;

          const nearbyCells = cellGrid.query(cell.x, cell.y, BOT_AI_SCAN_RANGE, aiCellsScratch);
          for (const other of nearbyCells) {
            if (other.ownerId === bot.id || other.dead) continue;
            const dx = other.x - cell.x;
            const dy = other.y - cell.y;
            const d2 = dx * dx + dy * dy;
            const dist = Math.sqrt(d2) || 1;

            if (other.mass > cell.mass * 1.03 && dist < 1180) {
              const danger = Math.max(0, 1 - dist / 1180) * clamp(other.mass / Math.max(1, cell.mass), 1, 5);
              avoidCellX -= dx / dist * danger;
              avoidCellY -= dy / dist * danger;
              avoidCellPower += danger;
            }

            if (other.radius >= cell.radius * CONSUME_RADIUS_RATIO && dist < 980) {
              continue;
            }

            if (cell.radius >= other.radius * CONSUME_RADIUS_RATIO && dist < 1050) {
              const score = other.mass / Math.max(120, dist);
              if (score > bestPreyScore) {
                bestPreyScore = score;
                bestPrey = other;
              }
            }
          }

          const nearbyViruses = virusGrid.query(cell.x, cell.y, 620, aiEntityScratch);
          let avoidVirusX = 0;
          let avoidVirusY = 0;
          let avoidVirusPower = 0;
          for (const virus of nearbyViruses) {
            if (cell.mass < VIRUS_EXPLODE_MASS) continue;
            const dx = virus.x - cell.x;
            const dy = virus.y - cell.y;
            const d2 = dx * dx + dy * dy;
            if (d2 > 620 * 620) continue;
            const d = Math.sqrt(d2) || 1;
            const danger = Math.max(0, 1 - d / 620);
            avoidVirusX -= dx / d * danger;
            avoidVirusY -= dy / d * danger;
            avoidVirusPower += danger;
          }

          if (avoidVirusPower > 0.18) {
            const n = normalized(avoidVirusX, avoidVirusY, bot.wanderX - cell.x, bot.wanderY - cell.y);
            cell.targetX = clamp(cell.x + n.x * 780, 120, WORLD_SIZE - 120);
            cell.targetY = clamp(cell.y + n.y * 780, 120, WORLD_SIZE - 120);
            continue;
          }

          if (avoidCellPower > 0.22) {
            const n = normalized(avoidCellX, avoidCellY, bot.wanderX - cell.x, bot.wanderY - cell.y);
            cell.targetX = clamp(cell.x + n.x * 980, 120, WORLD_SIZE - 120);
            cell.targetY = clamp(cell.y + n.y * 980, 120, WORLD_SIZE - 120);
            continue;
          }

          if (bestPrey) {
            cell.targetX = bestPrey.x;
            cell.targetY = bestPrey.y;
            const d = Math.hypot(bestPrey.x - cell.x, bestPrey.y - cell.y);
            continue;
          }

          const nearestHuman = nearestHumanCell(cell, bot.id);

          if (nearestHuman) {
            const orbit = nearestHuman.radius * 0.42 + 46;
            const angle = (cell.id * 2.399 + bot.respawns * 0.73) % TAU;
            cell.targetX = clamp(nearestHuman.x + Math.cos(angle) * orbit, 80, WORLD_SIZE - 80);
            cell.targetY = clamp(nearestHuman.y + Math.sin(angle) * orbit, 80, WORLD_SIZE - 80);
            continue;
          }

          let bestFood = null;
          let bestFoodD2 = Infinity;
          const nearbyFood = foodGrid.query(cell.x, cell.y, 620, aiEntityScratch);
          for (const food of nearbyFood) {
            if (food.dead) continue;
            const d2 = distSq(cell.x, cell.y, food.x, food.y);
            if (d2 < bestFoodD2) {
              bestFoodD2 = d2;
              bestFood = food;
            }
          }

          const nearbyFeeds = feedGrid.query(cell.x, cell.y, 760, aiEntityScratch);
          for (const feed of nearbyFeeds) {
            if (feed.dead) continue;
            if (feed.ownerId === cell.ownerId && feed.age < 0.75) continue;
            const d2 = distSq(cell.x, cell.y, feed.x, feed.y) * 0.45;
            if (d2 < bestFoodD2 && cell.radius >= feed.radius * CONSUME_RADIUS_RATIO) {
              bestFoodD2 = d2;
              bestFood = feed;
            }
          }

          if (bestFood) {
            cell.targetX = bestFood.x;
            cell.targetY = bestFood.y;
          } else {
            cell.targetX = bot.wanderX;
            cell.targetY = bot.wanderY;
          }
        }
      }
