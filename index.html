          setStatus("CONNECTED");
          if (state.net.role === "host") {
            state.net.lastSnapshotSend = -100;
            state.net.lastWorldSend = -100;
            sendAuthoritativeSnapshot(state.now || performance.now() / 1000, true);
          }
        };
        channel.onclose = () => {
          state.net.connected = false;
          setStatus("CLOSED");
        };
        channel.onerror = () => setStatus("CHANNEL NG");
        channel.onmessage = (event) => handleNetMessage(event.data);
      }

      function setupPeerJsConnection(conn) {
        if (state.net.peerConn && state.net.peerConn !== conn) {
          try { conn.close(); } catch (error) {}
          setStatus("ROOM FULL");
          return;
        }

        state.net.transport = "peerjs";
        state.net.peerConn = conn;
        conn.on("open", () => {
          if (state.net.connectTimer) {
            clearTimeout(state.net.connectTimer);
            state.net.connectTimer = 0;
          }
          state.net.connected = true;
          setStatus("CONNECTED");
          if (state.net.role === "host") {
            state.net.lastSnapshotSend = -100;
            state.net.lastWorldSend = -100;
            sendAuthoritativeSnapshot(state.now || performance.now() / 1000, true);
          }
        });
        conn.on("data", (data) => {
          handleNetMessage(typeof data === "string" ? data : JSON.stringify(data));
        });
        conn.on("close", () => {
          state.net.connected = false;
          setStatus("CLOSED");
        });
        conn.on("error", () => {
          if (state.net.role === "client" && !state.net.connected) {
            setStatus("NO ROOM");
            setTimeout(() => {
              if (state.net.transport === "peerjs" && !state.net.connected) closeNetwork(false);
            }, 900);
            return;
          }
          setStatus("ROOM NG");
        });
      }

      function resetFreshWorld(localId, onlineMode = false) {
        state.localActorId = localId;
        state.actors.length = 0;
        state.foods.length = 0;
        state.foodGridDirty = true;
        state.feeds.length = 0;
        state.viruses.length = 0;
        state.virusRespawnQueue.length = 0;
        state.nextBotIndex = 0;

        if (onlineMode) {
          const host = createActor("host", "P1", "#2e90fa", true, localId === "host" ? "local" : "remote");
          const guest = createActor("guest", "P2", "#f04438", true, localId === "guest" ? "local" : "remote");
          state.actors.push(host, guest);
          state.player = localId === "guest" ? guest : host;
          if (localId === "host") {
            spawnActor(host, PLAYER_START_MASS);
            spawnActor(guest, PLAYER_START_MASS);
            const initialFood = Math.min(state.settings.foodTarget, DEFAULT_FOOD_TARGET);
            while (state.foods.length < initialFood) addFood();
            const center = actorCenter(host);
            seedInitialViruses(center.x, center.y);
          }
        } else {
          const player = createActor("player", "YOU", "#2e90fa", true, "local");
          state.player = player;
          state.actors.push(player);
          spawnActor(player, PLAYER_START_MASS);
          ensureBotPopulation();
          const initialFood = Math.min(state.settings.foodTarget, DEFAULT_FOOD_TARGET);
          while (state.foods.length < initialFood) addFood();
          const center = actorCenter(player);
          seedInitialViruses(center.x, center.y);
        }

        const center = actorCenter(state.player);
        state.camera.x = center.x;
        state.camera.y = center.y;
        state.camera.zoom = mobileTargetZoom(Math.max(1, center.mass), Math.max(1, state.player.cells.length));
        rebuildSpatialHashes();
        state.flashUntil = state.now + 1.0;
      }

      function closeNetwork(keepWorld = true) {
        if (state.net.connectTimer) {
          clearTimeout(state.net.connectTimer);
          state.net.connectTimer = 0;
        }
        if (state.net.socket) {
          state.net.socket.onopen = null;
          state.net.socket.onclose = null;
          state.net.socket.onerror = null;
          state.net.socket.onmessage = null;
          try { state.net.socket.close(); } catch (error) {}
        }
        if (state.net.channel) {
          state.net.channel.onopen = null;
          state.net.channel.onclose = null;
          state.net.channel.onerror = null;
          state.net.channel.onmessage = null;
          try { state.net.channel.close(); } catch (error) {}
        }
        if (state.net.peerConn) {
          try { state.net.peerConn.close(); } catch (error) {}
        }
        if (state.net.peer) {
          state.net.peer.removeAllListeners();
          try { state.net.peer.destroy(); } catch (error) {}
        }
        if (state.net.pc) {
          state.net.pc.onconnectionstatechange = null;
          state.net.pc.oniceconnectionstatechange = null;
          state.net.pc.ondatachannel = null;
          try { state.net.pc.close(); } catch (error) {}
        }
        state.net.role = "offline";
        state.net.transport = "none";
        state.net.pc = null;
        state.net.channel = null;
        state.net.peer = null;
        state.net.peerConn = null;
        state.net.connectTimer = 0;
        state.net.socket = null;
        state.net.connected = false;
        state.net.iceCandidates = 0;
        state.net.worldBuffer = null;
        state.net.lastInputSend = -100;
        state.net.lastSnapshotSend = -100;
        state.net.lastWorldSend = -100;
        setStatus("OFFLINE");
        if (!keepWorld) resetFreshWorld("player", false);
      }

      async function startHostOnline() {
        if (!networkSupported()) {
          setStatus("NO WEBRTC");
          return;
        }
        closeNetwork(true);
        resetFreshWorld("host", true);
        state.net.role = "host";
        state.net.transport = "webrtc";
        const pc = createPeerConnection();
        state.net.pc = pc;
        setupDataChannel(pc.createDataChannel("agar-state"));
        setStatus("MAKE OFFER");
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await waitForIceGathering(pc, "OFFER ICE");
        const signal = encodeSignal(pc.localDescription);
        offerBox.value = signal;
        copySignal(signal);
        offerBox.focus();
        offerBox.select();
        setStatus("OFFER OK");
      }

      function startRoomHost() {
        if (!peerJsSupported()) {
          setStatus("PEERJS LOAD NG");
          return;
        }

        closeNetwork(true);
        resetFreshWorld("host", true);
        state.net.role = "host";
        state.net.transport = "peerjs";
        const peerId = normalizeRoomId();
        const peer = new Peer(peerId, {
          debug: 0,
          config: {
            iceServers: [
              { urls: "stun:stun.l.google.com:19302" },
              { urls: "stun:stun1.l.google.com:19302" }
            ]
          }
        });
        state.net.peer = peer;
        setStatus("ROOM OPENING");
        peer.on("open", () => setStatus(`ROOM ${roomBox.value}`));
        peer.on("connection", setupPeerJsConnection);
        peer.on("error", (error) => {
          if (error && error.type === "unavailable-id") setStatus("ROOM BUSY");
          else setStatus("ROOM NG");
        });
        peer.on("disconnected", () => setStatus("ROOM LOST"));
      }

      function joinRoom() {
        if (!peerJsSupported()) {
          setStatus("PEERJS LOAD NG");
          return;
        }

        closeNetwork(true);
        resetFreshWorld("guest", true);
        state.net.role = "client";
        state.net.transport = "peerjs";
        const hostPeerId = normalizeRoomId();
        const peer = new Peer(undefined, {
          debug: 0,
          config: {
            iceServers: [
              { urls: "stun:stun.l.google.com:19302" },
              { urls: "stun:stun1.l.google.com:19302" }
            ]
          }
        });
        state.net.peer = peer;
        setStatus("ROOM JOINING");
        peer.on("open", () => {
          const conn = peer.connect(hostPeerId, {
            label: "agar-state",
            reliable: false
          });
          setupPeerJsConnection(conn);
          state.net.connectTimer = setTimeout(() => {
            if (state.net.transport !== "peerjs" || state.net.connected) return;
            setStatus("NO ROOM");
            setTimeout(() => {
              if (state.net.transport === "peerjs" && !state.net.connected) closeNetwork(false);
            }, 900);
          }, 9000);
        });
        peer.on("error", () => setStatus("ROOM NG"));
        peer.on("disconnected", () => setStatus("ROOM LOST"));
      }

      async function createGuestAnswer() {
        if (!networkSupported()) {
          setStatus("NO WEBRTC");
          return;
        }
        const offer = parseSignal(offerBox.value, "OFFER");
        if (!offer) return;
        closeNetwork(true);
        resetFreshWorld("guest", true);
        state.net.role = "client";
        state.net.transport = "webrtc";
        const pc = createPeerConnection();
        state.net.pc = pc;
        pc.ondatachannel = (event) => setupDataChannel(event.channel);
        setStatus("MAKE ANSWER");
        await pc.setRemoteDescription(offer);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await waitForIceGathering(pc, "ANSWER ICE");
        const signal = encodeSignal(pc.localDescription);
        answerBox.value = signal;
        copySignal(signal);
        answerBox.focus();
        answerBox.select();
        setStatus("ANSWER OK");
      }

      async function applyHostAnswer() {
        if (state.net.role !== "host" || !state.net.pc) {
          setStatus("NO HOST");
          return;
        }
        const answer = parseSignal(answerBox.value, "ANSWER");
        if (!answer) return;
        await state.net.pc.setRemoteDescription(answer);
        setStatus("CONNECTING");
      }

      function startRelayOnline(role) {
        if (typeof WebSocket !== "function") {
          setStatus("NO WS");
          return;
        }

        ensureRelayDefaults();
        const url = serverUrlBox.value.trim();
        if (!/^wss?:\/\//i.test(url)) {
          setStatus("SET RELAY URL");
          serverUrlBox.focus();
          return;
        }
        const room = roomBox.value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 24) || "agar";
        roomBox.value = room;

        closeNetwork(true);
        resetFreshWorld(role === "host" ? "host" : "guest", true);
        state.net.role = role === "host" ? "host" : "client";
        state.net.transport = "relay";
        state.net.connected = false;
        setStatus("RELAY CONNECT");

        const socket = new WebSocket(url);
        state.net.socket = socket;

        socket.onopen = () => {
          state.net.connected = true;
          setStatus("RELAY JOIN");
          socket.send(JSON.stringify({
            t: "relayJoin",
            room,
            role: state.net.role
          }));
          if (state.net.role === "host") {
            state.net.lastSnapshotSend = -100;
            state.net.lastWorldSend = -100;
          }
        };

        socket.onmessage = (event) => handleRelayMessage(event.data);
        socket.onerror = () => setStatus("RELAY NG");
        socket.onclose = () => {
          state.net.connected = false;
          if (state.net.transport === "relay") setStatus("RELAY CLOSED");
        };
      }

      function handleRelayMessage(data) {
        let message = null;
        try {
          message = JSON.parse(data);
        } catch (error) {
          return;
        }

        if (message.t === "relayReady") {
          setStatus(`ROOM ${message.peers}/2`);
          return;
        }

        if (message.t === "relayPeer") {
          setStatus(`PEER ${message.peers}/2`);
          if (state.net.role === "host" && message.peers >= 2) {
            sendAuthoritativeSnapshot(state.now || performance.now() / 1000, true);
          }
          return;
        }

        if (message.t === "relayError") {
          setStatus(message.message || "RELAY ERROR");
          return;
        }

        handleNetMessage(JSON.stringify(message));
      }

      function serializeCell(cell) {
        return {
          id: cell.id,
          x: cell.x,
          y: cell.y,
          mass: cell.mass,
          vx: cell.vx,
          vy: cell.vy,
          boostX: cell.boostX,
          boostY: cell.boostY,
          mergeReadyAt: cell.mergeReadyAt,
          capFramesLeft: cell.capFramesLeft,
          birthAge: cell.birthAge,
          birthDuration: cell.birthDuration,
          birthX: cell.birthX,
          birthY: cell.birthY,
          birthScale: cell.birthScale,
          fragmentAge: cell.fragmentAge,
          splitBoostAge: cell.splitBoostAge,
          virusCooldown: cell.virusCooldown,
          mergeVirusWindow: cell.mergeVirusWindow,
          mergeOverflowMass: cell.mergeOverflowMass,
          mergeBurstPieces: cell.mergeBurstPieces,
          mergeBurstTotal: cell.mergeBurstTotal,
          targetX: cell.targetX,
          targetY: cell.targetY
        };
      }

      function serializeActor(actor) {
        return {
          id: actor.id,
          name: actor.name,
          color: actor.color,
          isHuman: actor.isHuman,
          cells: actor.cells.filter((cell) => !cell.dead).map(serializeCell)
        };
      }

      function serializeCircle(entity) {
        return {
          id: entity.id,
          x: entity.x,
          y: entity.y,
          mass: entity.mass,
          radius: entity.radius,
          color: entity.color,
          vx: entity.vx || 0,
          vy: entity.vy || 0,
          age: entity.age || 0,
          feedCount: entity.feedCount || 0,
          ownerId: entity.ownerId || ""
        };
      }

      function sendAuthoritativeSnapshot(now, forceWorld = false) {
        if (state.net.role !== "host" || !state.net.connected) return;
        const sendFast = forceWorld || now - state.net.lastSnapshotSend >= 1 / 14;
        const sendWorld = forceWorld || now - state.net.lastWorldSend >= 1.0;
        if (!sendFast && !sendWorld) return;

        const message = {
          t: "snapshot",
          now,
          actors: state.actors.map(serializeActor),
          feeds: state.feeds.filter((feed) => !feed.dead).map(serializeCircle)
        };
        if (netSend(message)) state.net.lastSnapshotSend = now;
        if (sendWorld) {
          state.net.worldSeq += 1;
          sendWorldChunks("foods", foodsForNetworkSync().map(serializeCircle), state.net.worldSeq);
          sendWorldChunks("viruses", state.viruses.filter((virus) => !virus.dead).map(serializeCircle), state.net.worldSeq);
          state.net.lastWorldSend = now;
        }
      }

      function foodsForNetworkSync() {
        const liveFoods = state.foods.filter((food) => !food.dead);
        if (liveFoods.length <= MAX_SYNC_FOODS) return liveFoods;
        const foods = [];
        const seen = new Set();
        const addVisibleForActor = (actor) => {
          if (!actor || !actor.isHuman) return;
          const center = actorCenter(actor);
          const range = 1600;
          const nearby = foodGrid.queryRect(center.x - range, center.y - range, center.x + range, center.y + range, aiEntityScratch);
          for (const food of nearby) {
            if (food.dead || seen.has(food.id)) continue;
            seen.add(food.id);
            foods.push(food);
            if (foods.length >= MAX_SYNC_FOODS) return;
          }
        };

        for (const actor of state.actors) {
          addVisibleForActor(actor);
          if (foods.length >= MAX_SYNC_FOODS) return foods;
        }

        const stride = Math.max(1, Math.ceil(liveFoods.length / MAX_SYNC_FOODS));
        for (let i = 0; i < liveFoods.length && foods.length < MAX_SYNC_FOODS; i += stride) {
          const food = liveFoods[i];
          if (seen.has(food.id)) continue;
          foods.push(food);
        }
        return foods;
      }

      function sendWorldChunks(kind, items, seq) {
        const total = Math.max(1, Math.ceil(items.length / WORLD_SYNC_CHUNK));
        for (let index = 0; index < total; index += 1) {
          const start = index * WORLD_SYNC_CHUNK;
          netSend({
            t: "world",
            kind,
            seq,
            index,
            total,
            items: items.slice(start, start + WORLD_SYNC_CHUNK)
          });
        }
      }

      function sendLocalInput(now) {
        if (state.net.role !== "client" || !state.net.connected || !state.player) return;
        const urgent = state.player.input.splitQueued;
        if (!urgent && now - state.net.lastInputSend < 1 / 30) return;
        netSend({
          t: "input",
          targetX: state.player.input.targetX,
          targetY: state.player.input.targetY,
          w: state.player.input.keys.has("KeyW"),
          splitSeq: state.input.splitSeq
        });
        state.player.input.splitQueued = false;
        state.net.lastInputSend = now;
      }

      function handleNetMessage(data) {
        let message = null;
        try {
          message = JSON.parse(data);
        } catch (error) {
          return;
        }

        if (state.net.role === "host" && message.t === "input") {
          const guest = actorById("guest");
          if (!guest) return;
          guest.input.targetX = clamp(Number(message.targetX) || WORLD_SIZE * 0.5, 0, WORLD_SIZE);
          guest.input.targetY = clamp(Number(message.targetY) || WORLD_SIZE * 0.5, 0, WORLD_SIZE);
          if (message.w) guest.input.keys.add("KeyW");
          else guest.input.keys.delete("KeyW");
          const splitSeq = Number(message.splitSeq) || 0;
          if (splitSeq > guest.input.lastNetSplitSeq) {
            guest.input.splitQueued = true;
            guest.input.lastNetSplitSeq = splitSeq;
          }
          return;
        }

        if (state.net.role === "client" && message.t === "snapshot") {
          applySnapshot(message);
          return;
        }

        if (state.net.role === "client" && message.t === "world") {
          applyWorldChunk(message);
        }
      }

      function applyCellSnapshot(actor, data) {
        const cell = {
          id: data.id,
          actor,
          ownerId: actor.id,
          x: clamp(data.x, 0, WORLD_SIZE),
          y: clamp(data.y, 0, WORLD_SIZE),
          mass: Math.max(MIN_CELL_MASS, data.mass),
          radius: 1,
          vx: data.vx || 0,
          vy: data.vy || 0,
          boostX: data.boostX || 0,
          boostY: data.boostY || 0,
          cooldown: 0,
          mergeReadyAt: data.mergeReadyAt || 0,
          capFramesLeft: data.capFramesLeft || 0,
          birthAge: data.birthAge == null ? 1 : data.birthAge,
          birthDuration: data.birthDuration || 0,
          birthX: data.birthX == null ? data.x : data.birthX,
          birthY: data.birthY == null ? data.y : data.birthY,
          birthScale: data.birthScale == null ? 1 : data.birthScale,
          fragmentAge: data.fragmentAge || 0,
          splitBoostAge: data.splitBoostAge || 0,
          virusCooldown: data.virusCooldown || 0,
          mergeVirusWindow: data.mergeVirusWindow || 0,
          mergeOverflowMass: data.mergeOverflowMass || 0,
          mergeBurstPieces: data.mergeBurstPieces || 1,
          mergeBurstTotal: data.mergeBurstTotal || data.mass,
          targetX: data.targetX == null ? data.x : data.targetX,
          targetY: data.targetY == null ? data.y : data.targetY,
          dead: false
        };
        refreshCell(cell);
        return cell;
      }

      function applyActorSnapshot(data) {
        let actor = actorById(data.id);
        if (!actor) {
          actor = createActor(
            data.id,
            data.name || data.id,
            data.color || "#2e90fa",
            Boolean(data.isHuman),
            data.id === state.localActorId ? "local" : (data.isHuman ? "remote" : "bot")
          );
        }
        actor.name = data.name || actor.name;
        actor.color = data.color || actor.color;
        actor.isHuman = Boolean(data.isHuman);
        actor.control = data.id === state.localActorId ? "local" : (actor.isHuman ? "remote" : "bot");
        actor.cells = (data.cells || []).map((cellData) => applyCellSnapshot(actor, cellData));
        return actor;
      }

      function applyEntitySnapshot(data, type) {
        return {
          id: data.id,
          type,
          x: clamp(data.x, 0, WORLD_SIZE),
          y: clamp(data.y, 0, WORLD_SIZE),
          mass: Math.max(type === "food" ? 1 : MIN_CELL_MASS, data.mass),
          radius: data.radius || radiusFromMass(data.mass),
          color: data.color || (type === "virus" ? "#12e05a" : foodPalette[0]),
          vx: data.vx || 0,
          vy: data.vy || 0,
          age: data.age || 0,
          feedCount: data.feedCount || 0,
          ownerId: data.ownerId || "",
          dead: false
        };
      }

      function applySnapshot(message) {
        const actors = (message.actors || []).map(applyActorSnapshot);
        state.actors = actors;
        state.player = actorById(state.localActorId) || actors[0] || state.player;

        state.feeds = (message.feeds || []).map((entity) => applyEntitySnapshot(entity, "feed"));
        rebuildSpatialHashes();
      }

      function applyWorldChunk(message) {
        if (message.kind !== "foods" && message.kind !== "viruses") return;
        if (!state.net.worldBuffer || state.net.worldBuffer.seq !== message.seq) {
          state.net.worldBuffer = {
            seq: message.seq,
            foods: new Map(),
            viruses: new Map()
          };
        }

        const bucket = state.net.worldBuffer[message.kind];
        bucket.set(message.index, message.items || []);
        if (bucket.size < message.total) return;

        const merged = [];
        for (let index = 0; index < message.total; index += 1) {
          const chunk = bucket.get(index);
          if (!chunk) return;
          merged.push(...chunk);
        }

        if (message.kind === "foods") {
          state.foods = merged.map((entity) => applyEntitySnapshot(entity, "food"));
          state.foodGridDirty = true;
        } else {
          state.viruses = merged.map((entity) => applyEntitySnapshot(entity, "virus"));
        }
        rebuildSpatialHashes();
      }

      function visibleWorldBounds(pad = 120) {
        const halfW = state.width * 0.5 / state.camera.zoom;
        const halfH = state.height * 0.5 / state.camera.zoom;
        return {
          left: state.camera.x - halfW - pad,
          right: state.camera.x + halfW + pad,
          top: state.camera.y - halfH - pad,
          bottom: state.camera.y + halfH + pad
        };
      }

      function isVisible(item, bounds, pad = 0) {
        return item.x + item.radius + pad >= bounds.left &&
          item.x - item.radius - pad <= bounds.right &&
          item.y + item.radius + pad >= bounds.top &&
          item.y - item.radius - pad <= bounds.bottom;
      }

      function drawGrid(bounds) {
        ctx.lineWidth = 1 / state.camera.zoom;
        ctx.strokeStyle = "#e6ebf2";
        ctx.beginPath();
        const startSmallX = Math.floor(bounds.left / GRID_SMALL) * GRID_SMALL;
        const endSmallX = Math.ceil(bounds.right / GRID_SMALL) * GRID_SMALL;
        const startSmallY = Math.floor(bounds.top / GRID_SMALL) * GRID_SMALL;
        const endSmallY = Math.ceil(bounds.bottom / GRID_SMALL) * GRID_SMALL;
        for (let x = startSmallX; x <= endSmallX; x += GRID_SMALL) {
          ctx.moveTo(x, bounds.top);
          ctx.lineTo(x, bounds.bottom);
        }
        for (let y = startSmallY; y <= endSmallY; y += GRID_SMALL) {
          ctx.moveTo(bounds.left, y);
          ctx.lineTo(bounds.right, y);
        }
        ctx.stroke();

        ctx.lineWidth = 1.4 / state.camera.zoom;
        ctx.strokeStyle = "#cfd8e3";
        ctx.beginPath();
        const startLargeX = Math.floor(bounds.left / GRID_LARGE) * GRID_LARGE;
        const endLargeX = Math.ceil(bounds.right / GRID_LARGE) * GRID_LARGE;
        const startLargeY = Math.floor(bounds.top / GRID_LARGE) * GRID_LARGE;
        const endLargeY = Math.ceil(bounds.bottom / GRID_LARGE) * GRID_LARGE;
        for (let x = startLargeX; x <= endLargeX; x += GRID_LARGE) {
          ctx.moveTo(x, bounds.top);
          ctx.lineTo(x, bounds.bottom);
        }
        for (let y = startLargeY; y <= endLargeY; y += GRID_LARGE) {
          ctx.moveTo(bounds.left, y);
          ctx.lineTo(bounds.right, y);
        }
        ctx.stroke();
      }

      function drawCircleEntity(entity) {
        ctx.beginPath();
        ctx.arc(entity.x, entity.y, entity.radius, 0, TAU);
        ctx.fillStyle = entity.color;
        ctx.fill();
      }

      function drawVirus(virus) {
        const spikes = 30;
        ctx.beginPath();
        for (let i = 0; i < spikes; i += 1) {
          const angle = (i / spikes) * TAU;
          const radius = virus.radius * (i % 2 === 0 ? 1.18 : 0.84);
          const x = virus.x + Math.cos(angle) * radius;
          const y = virus.y + Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = "#12e05a";
        ctx.fill();
        ctx.lineWidth = Math.max(3 / state.camera.zoom, virus.radius * 0.09);
        ctx.strokeStyle = "#0d9940";
        ctx.stroke();
      }

      function drawCell(cell) {
        const actor = cell.actor;
        let progress = 1;
        if (cell.birthDuration > 0 && cell.birthAge < cell.birthDuration) {
          progress = clamp(cell.birthAge / cell.birthDuration, 0, 1);
          progress = 1 - Math.pow(1 - progress, 3);
        }
        const scale = cell.birthScale + (1 - cell.birthScale) * progress;
        const drawX = cell.birthX + (cell.x - cell.birthX) * progress;
        const drawY = cell.birthY + (cell.y - cell.birthY) * progress;
        const r = Math.max(1, cell.radius * scale);
        ctx.beginPath();
        ctx.arc(drawX, drawY, r, 0, TAU);
        ctx.fillStyle = actor.color;
        ctx.fill();
        ctx.lineWidth = Math.max(3 / state.camera.zoom, r * 0.045);
        ctx.strokeStyle = isLocalActor(actor) ? "#07529e" : darkenHex(actor.color, 0.24);
        ctx.stroke();

        if (scale > 0.72 && r * state.camera.zoom > 14) {
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          const nameSize = clamp(r * 0.34, 13, 42);
          ctx.font = `700 ${nameSize}px Inter, ui-sans-serif, system-ui, sans-serif`;
          ctx.lineWidth = Math.max(2, nameSize * 0.16);
          ctx.strokeStyle = "rgba(8, 18, 32, 0.42)";
          ctx.fillStyle = "rgba(255, 255, 255, 0.96)";
          const label = displayActorName(actor);
          ctx.strokeText(label, drawX, drawY - nameSize * 0.12);
          ctx.fillText(label, drawX, drawY - nameSize * 0.12);

          if (r * state.camera.zoom > 32) {
            const massSize = clamp(r * 0.2, 10, 25);
            ctx.font = `700 ${massSize}px Inter, ui-sans-serif, system-ui, sans-serif`;
            ctx.lineWidth = Math.max(2, massSize * 0.14);
            ctx.strokeText(String(Math.round(cell.mass)), drawX, drawY + nameSize * 0.62);
            ctx.fillText(String(Math.round(cell.mass)), drawX, drawY + nameSize * 0.62);
          }
        }
      }

      function draw() {
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        ctx.fillStyle = "#f7f9fc";
        ctx.fillRect(0, 0, state.width, state.height);

        ctx.save();
        ctx.translate(state.width * 0.5, state.height * 0.5);
        ctx.scale(state.camera.zoom, state.camera.zoom);
        ctx.translate(-state.camera.x, -state.camera.y);

        const bounds = visibleWorldBounds();
        drawGrid(bounds);

        ctx.lineWidth = 3 / state.camera.zoom;
        ctx.strokeStyle = "rgba(128, 139, 154, 0.55)";
        ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        const visibleFoods = foodGrid.queryRect(bounds.left - 20, bounds.top - 20, bounds.right + 20, bounds.bottom + 20, aiEntityScratch);
        for (const food of visibleFoods) {
          if (food.dead) continue;
          if (isVisible(food, bounds, 20)) drawCircleEntity(food);
        }

        for (const feed of state.feeds) {
          if (!isVisible(feed, bounds, 20)) continue;
          ctx.beginPath();
          ctx.arc(feed.x, feed.y, feed.radius, 0, TAU);
          ctx.fillStyle = feed.color;
          ctx.fill();
          ctx.lineWidth = 1.5 / state.camera.zoom;
          ctx.strokeStyle = "rgba(20,32,51,0.22)";
          ctx.stroke();
        }

        for (const virus of state.viruses) {
          if (isVisible(virus, bounds, 90)) drawVirus(virus);
        }

        const cells = allCells(scratch).sort((a, b) => a.radius - b.radius);
        for (const cell of cells) {
          if (isVisible(cell, bounds, 80)) drawCell(cell);
        }

        ctx.restore();
      }

      function resize() {
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);
        state.width = Math.max(320, window.innerWidth);
        state.height = Math.max(240, window.innerHeight);
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        canvas.style.width = `${state.width}px`;
        canvas.style.height = `${state.height}px`;
        state.input.mouseX = state.width * 0.5;
        state.input.mouseY = state.height * 0.5;
      }

      function onPointerMove(event) {
        state.input.mouseX = event.clientX;
        state.input.mouseY = event.clientY;
      }

      function onTouch(event) {
        if (!event.touches.length) return;
        const touch = event.touches[0];
        state.input.mouseX = touch.clientX;
        state.input.mouseY = touch.clientY;
        event.preventDefault();
      }

      function setViewScalePercent(value) {
        const percent = clamp(Number(value) || 100, 55, 220);
        state.viewScale = percent / 100;
        viewValueEl.textContent = `${Math.round(percent)}%`;
      }

      function onWheel(event) {
        event.preventDefault();
        const direction = event.deltaY > 0 ? 1 : -1;
        setViewScalePercent(state.viewScale * 100 + direction * 6);
      }

      function syncSettingsControls() {
        botSlider.value = String(state.settings.botTarget);
        botValueEl.textContent = String(state.settings.botTarget);
        virusSlider.value = String(state.settings.virusTarget);
        virusValueEl.textContent = String(state.settings.virusTarget);
        foodSlider.value = String(state.settings.foodTarget);
        foodValueEl.textContent = String(state.settings.foodTarget);
      }

      function trimDynamicEntities() {
        if (state.foods.length > state.settings.foodTarget) {
          state.foods.length = state.settings.foodTarget;
          state.foodGridDirty = true;
        }
        if (state.viruses.length > state.settings.virusTarget) state.viruses.length = state.settings.virusTarget;
        const maxQueue = Math.max(0, state.settings.virusTarget - state.viruses.length);
        if (state.virusRespawnQueue.length > maxQueue) state.virusRespawnQueue.length = maxQueue;
        ensureBotPopulation();
      }

      function setWorldSetting(kind, value) {
        const number = Math.round(Number(value) || 0);
        if (kind === "bot") state.settings.botTarget = clamp(number, 0, 200);
        if (kind === "virus") state.settings.virusTarget = clamp(number, 0, 500);
        if (kind === "food") state.settings.foodTarget = clamp(Math.round(number / 100) * 100, 0, 100000);
        syncSettingsControls();
        trimDynamicEntities();
      }

      function resetGameToStart() {
        if (state.net.role === "offline") {
          resetFreshWorld("player", false);
          return;
        }

        if (state.net.role === "host") {
          const transport = state.net.transport;
          resetFreshWorld("host", true);
          state.net.role = "host";
          state.net.transport = transport;
          state.net.connected = Boolean(state.net.channel?.readyState === "open" || state.net.socket?.readyState === WebSocket.OPEN);
          state.net.lastSnapshotSend = -100;
          state.net.lastWorldSend = -100;
          sendAuthoritativeSnapshot(state.now || performance.now() / 1000, true);
          return;
        }

        setStatus("HOST RESET");
      }

      function bindInput() {
        window.addEventListener("resize", resize);
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("touchstart", onTouch, { passive: false });
        window.addEventListener("touchmove", onTouch, { passive: false });
        window.addEventListener("wheel", onWheel, { passive: false });
        window.addEventListener("keydown", (event) => {
          if (event.code === "Space" || event.code === "KeyW") {
            event.preventDefault();
            state.input.keys.add(event.code);
            if (event.code === "Space" && !event.repeat) {
              state.input.splitQueued = true;
              state.input.splitSeq += 1;
            }
          }
        });
        window.addEventListener("keyup", (event) => {
          if (event.code === "Space" || event.code === "KeyW") {
            event.preventDefault();
            state.input.keys.delete(event.code);
          }
        });
        window.addEventListener("blur", () => {
          state.input.keys.clear();
          state.input.splitQueued = false;
        });
        hostBtn.addEventListener("click", () => {
          startRoomHost();
        });
        joinBtn.addEventListener("click", () => {
          joinRoom();
        });
        applyAnswerBtn.addEventListener("click", () => {
          applyHostAnswer().catch(() => setStatus("ANSWER NG"));
        });
        relayHostBtn.addEventListener("click", () => startRelayOnline("host"));
        relayJoinBtn.addEventListener("click", () => startRelayOnline("client"));
        disconnectBtn.addEventListener("click", () => closeNetwork(false));
        gameResetBtn.addEventListener("click", resetGameToStart);
        botSlider.addEventListener("input", () => setWorldSetting("bot", botSlider.value));
        virusSlider.addEventListener("input", () => setWorldSetting("virus", virusSlider.value));
        foodSlider.addEventListener("input", () => setWorldSetting("food", foodSlider.value));
      }

      function seedInitialViruses(avoidX, avoidY) {
        state.viruses.length = 0;
        state.virusRespawnQueue.length = 0;
        const virusTarget = state.settings.virusTarget;
        if (virusTarget <= 0) return;
        const columns = Math.ceil(Math.sqrt(virusTarget));
        const rows = Math.ceil(virusTarget / columns);
        const margin = 420;
        const stepX = (WORLD_SIZE - margin * 2) / Math.max(1, columns - 1);
        const stepY = (WORLD_SIZE - margin * 2) / Math.max(1, rows - 1);
        const jitterX = Math.min(34, stepX * 0.22);
        const jitterY = Math.min(34, stepY * 0.22);

        for (let row = 0; row < rows && state.viruses.length < virusTarget; row += 1) {
          for (let column = 0; column < columns && state.viruses.length < virusTarget; column += 1) {
            const x = margin + column * stepX + rand(-jitterX, jitterX);
            const y = margin + row * stepY + rand(-jitterY, jitterY);
            if (distSq(x, y, avoidX, avoidY) < 560 * 560) continue;
            if (!virusSpawnIsSafe(x, y)) continue;
            state.viruses.push(createVirus(x, y));
          }
        }

        while (state.viruses.length < virusTarget) {
          state.viruses.push(spawnVirusSafely(avoidX, avoidY));
        }
      }

      function virusSpawnIsSafe(x, y) {
        const virusRadius = radiusFromMass(VIRUS_MASS);
        for (const virus of state.viruses) {
          if (virus.dead) continue;
          const safeDistance = virusRadius + virus.radius + 10;
          if (distSq(x, y, virus.x, virus.y) < safeDistance * safeDistance) return false;
        }

        for (const actor of state.actors) {
          for (const cell of actor.cells) {
            const safeDistance = cell.radius + virusRadius + 120;
            if (distSq(x, y, cell.x, cell.y) < safeDistance * safeDistance) return false;
          }
        }
        return true;
      }

      function init() {
        resize();
        bindInput();
        ensureRelayDefaults();
        setViewScalePercent(DEFAULT_VIEW_SCALE * 100);
        syncSettingsControls();

        resetFreshWorld("player", false);

        requestAnimationFrame(loop);
      }

      function loop(time) {
        const dt = Math.min(0.04, Math.max(0.001, (time - state.lastFrame) / 1000));
        state.lastFrame = time;
        const now = time / 1000;

        state.fpsSample += ((1 / dt) - state.fpsSample) * 0.08;
        state.fpsTimer += dt;
        if (state.fpsTimer > 0.25) {
          state.fps = state.fpsSample;
          state.fpsTimer = 0;
        }

        update(dt, now);
        draw();
        requestAnimationFrame(loop);
      }

      init();
    })();
  </script>
</body>
</html>
