      function nearestHumanCell(cell, excludeActorId = "") {
        let nearest = null;
        let nearestD2 = Infinity;
        for (const actor of state.actors) {
          if (!actor.isHuman || actor.id === excludeActorId) continue;
          for (const humanCell of actor.cells) {
            if (humanCell.dead) continue;
            const d2 = distSq(cell.x, cell.y, humanCell.x, humanCell.y);
            if (d2 < nearestD2) {
              nearestD2 = d2;
              nearest = humanCell;
            }
          }
        }
        return nearest;
      }

      function nearestEdibleVirus(cell) {
        let nearest = null;
        let nearestD2 = Infinity;
        const nearby = virusGrid.query(cell.x, cell.y, 1600, aiEntityScratch);
        for (const virus of nearby) {
          if (virus.dead) continue;
          if (cell.mass + 0.001 < virus.mass * CONSUME_MASS_RATIO) continue;
          if (cell.radius + 0.001 < virus.radius * CONSUME_RADIUS_RATIO) continue;
          const d2 = distSq(cell.x, cell.y, virus.x, virus.y);
          if (d2 < nearestD2) {
            nearestD2 = d2;
            nearest = virus;
          }
        }
        return nearest;
      }

      function cellSpeed(cell) {
        return clamp(1440 / Math.pow(cell.radius, 0.46), 116, 436) * CELL_MOVE_SPEED_SCALE;
      }

      function turnCellFacing(cell, targetDir, dt) {
        if (cell.instantFacing) {
          cell.faceX = targetDir.x;
          cell.faceY = targetDir.y;
          return;
        }
        const current = normalized(
          Number.isFinite(cell.faceX) ? cell.faceX : 1,
          Number.isFinite(cell.faceY) ? cell.faceY : 0,
          1,
          0
        );
        const turnRate = cell.splitBoostAge > 0 ? 1.1 : 7.2;
        const turn = 1 - Math.exp(-dt * turnRate);
        const next = normalized(
          current.x + (targetDir.x - current.x) * turn,
          current.y + (targetDir.y - current.y) * turn,
          targetDir.x,
          targetDir.y
        );
        cell.faceX = next.x;
        cell.faceY = next.y;
      }

      function splitMotionSubsteps(dt) {
        let maxSpeed = 0;
        for (const actor of state.actors) {
          for (const cell of actor.cells) {
            if (cell.dead) continue;
            const speed = Math.hypot(cell.vx + cell.boostX, cell.vy + cell.boostY);
            if (speed > maxSpeed) maxSpeed = speed;
          }
        }
        return clamp(Math.ceil(maxSpeed * dt / 12), 1, 28);
      }

      function beginCellSweeps() {
        for (const actor of state.actors) {
          for (const cell of actor.cells) {
            if (cell.dead) continue;
            const boostSpeed = Math.hypot(cell.boostX, cell.boostY);
            cell.sweepActive = cell.splitBoostAge > 0 || cell.fragmentAge > 0 || boostSpeed > 30;
            cell.sweepFromX = cell.x;
            cell.sweepFromY = cell.y;
            cell.sweepToX = cell.x;
            cell.sweepToY = cell.y;
            cell.sweepPoints = cell.sweepActive ? [{ x: cell.x, y: cell.y }] : null;
          }
        }
      }

      function appendCellSweepPoint(cell) {
        if (!cell.sweepActive || !cell.sweepPoints) return;
        const last = cell.sweepPoints[cell.sweepPoints.length - 1];
        if (distSq(last.x, last.y, cell.x, cell.y) > 0.25) {
          cell.sweepPoints.push({ x: cell.x, y: cell.y });
        }
        cell.sweepToX = cell.x;
        cell.sweepToY = cell.y;
      }

      function finishCellSweeps() {
        for (const actor of state.actors) {
          for (const cell of actor.cells) {
            if (cell.dead) continue;
            appendCellSweepPoint(cell);
          }
        }
      }

      function queryAlongCellPath(grid, cell, range, out) {
        if (!hasSweepPath(cell)) return grid.query(cell.x, cell.y, range, out);
        let left = cell.x;
        let right = cell.x;
        let top = cell.y;
        let bottom = cell.y;
        for (const point of cell.sweepPoints) {
          left = Math.min(left, point.x);
          right = Math.max(right, point.x);
          top = Math.min(top, point.y);
          bottom = Math.max(bottom, point.y);
        }
        return grid.queryRect(left - range, top - range, right + range, bottom + range, out);
      }

      function updateCellMotion(dt) {
        beginCellSweeps();
        const steps = splitMotionSubsteps(dt);
        const stepDt = dt / steps;
        for (let step = 0; step < steps; step += 1) {
          moveCellsStep(stepDt);
          if (steps > 1) {
            resolveOwnCells();
            finishCellSweeps();
          }
        }
        finishCellSweeps();
      }

      function moveCellsStep(dt) {
        for (const actor of state.actors) {
          for (const cell of actor.cells) {
            if (cell.splitHoldAge > 0) {
              cell.splitHoldAge = Math.max(0, cell.splitHoldAge - dt);
              cell.vx *= Math.exp(-dt * 16);
              cell.vy *= Math.exp(-dt * 16);
              if (cell.splitHoldAge <= 0) {
                cell.boostX += cell.pendingBoostX || 0;
                cell.boostY += cell.pendingBoostY || 0;
                cell.pendingBoostX = 0;
                cell.pendingBoostY = 0;
              } else {
                if (cell.birthAge < cell.birthDuration) {
                  cell.birthAge = Math.min(cell.birthDuration, cell.birthAge + dt);
                }
                appendCellSweepPoint(cell);
                continue;
              }
            }
            if (receivesPlayerInput(actor)) {
              cell.targetX = actor.input.targetX;
              cell.targetY = actor.input.targetY;
            }

            const instantControl = receivesPlayerInput(actor) && cell.splitBoostAge <= 0 && cell.fragmentAge <= 0;
            const dx = cell.targetX - cell.x;
            const dy = cell.targetY - cell.y;
            const n = normalized(dx, dy, 0, 0);
            const speed = cellSpeed(cell);
            const throttle = clamp(n.length / Math.max(35, cell.radius * 1.8), 0, 1);
            cell.instantFacing = instantControl;
            if (n.length > 0.001) turnCellFacing(cell, n, dt);
            cell.instantFacing = false;
            const desiredX = (Number.isFinite(cell.faceX) ? cell.faceX : n.x) * speed * throttle;
            const desiredY = (Number.isFinite(cell.faceY) ? cell.faceY : n.y) * speed * throttle;
            const steer = instantControl ? 1 : 1 - Math.exp(-dt * (cell.splitBoostAge > 0 ? 1.35 : 4.7));

            cell.vx += (desiredX - cell.vx) * steer;
            cell.vy += (desiredY - cell.vy) * steer;
            const boostSpeed = Math.hypot(cell.boostX, cell.boostY);
            const hasSplitMomentum = cell.splitBoostAge > 0 || boostSpeed > 30;
            const maxBoost = cell.fragmentAge > 0
              ? 1120
              : (hasSplitMomentum ? SPLIT_MAX_BOOST * splitSpeedScale() : 720);
            capVelocity(cell, speed * 1.35);
            capBoost(cell, maxBoost);
            cell.x += (cell.vx + cell.boostX) * dt;
            cell.y += (cell.vy + cell.boostY) * dt;

            const decayRate = cell.fragmentAge > 0 ? 2.6 : (hasSplitMomentum ? SPLIT_BOOST_DECAY : 3.7);
            const decay = Math.exp(-dt * decayRate);
            cell.boostX *= decay;
            cell.boostY *= decay;
            if (Math.abs(cell.boostX) < 0.02) cell.boostX = 0;
            if (Math.abs(cell.boostY) < 0.02) cell.boostY = 0;
            capBoost(cell, maxBoost);

            if (cell.birthAge < cell.birthDuration) {
              cell.birthAge = Math.min(cell.birthDuration, cell.birthAge + dt);
            }
            if (cell.fragmentAge > 0) cell.fragmentAge = Math.max(0, cell.fragmentAge - dt);
            if (cell.splitBoostAge > 0) cell.splitBoostAge = Math.max(0, cell.splitBoostAge - dt);
            if (cell.virusCooldown > 0) cell.virusCooldown = Math.max(0, cell.virusCooldown - dt);
            if (cell.mergeVirusWindow > 0) cell.mergeVirusWindow = Math.max(0, cell.mergeVirusWindow - dt);
            cell.cooldown = mergeTimeLeft(cell);
            let cappedThisFrame = false;
            if (cell.mass > MAX_CELL_MASS) {
              const preservedMergeTotal = cell.mergeVirusWindow > 0
                ? Math.max(cell.mergeBurstTotal || 0, cell.mass)
                : cell.mass;
              if (cell.capFramesLeft <= 0) cell.capFramesLeft = MASS_CAP_SETTLE_FRAMES;
              const frameStep = Math.min(cell.capFramesLeft, dt * 60);
              const reduceRatio = frameStep / Math.max(1, cell.capFramesLeft);
              cell.mass -= (cell.mass - MAX_CELL_MASS) * reduceRatio;
              cell.capFramesLeft -= frameStep;
              if (cell.capFramesLeft <= 0.001 || cell.mass <= MAX_CELL_MASS + 0.001) {
                cell.mass = MAX_CELL_MASS;
                cell.capFramesLeft = 0;
              }
              cell.mergeOverflowMass = Math.max(0, preservedMergeTotal - MAX_CELL_MASS);
              cell.mergeBurstPieces = 1;
              cell.mergeBurstTotal = preservedMergeTotal;
              refreshCell(cell);
              cappedThisFrame = true;
            } else {
              cell.capFramesLeft = 0;
              if (cell.mergeVirusWindow > 0 && (cell.mergeBurstTotal || 0) > MAX_CELL_MASS) {
                cell.mergeOverflowMass = Math.max(0, cell.mergeBurstTotal - MAX_CELL_MASS);
                cell.mergeBurstPieces = 1;
              } else {
                cell.mergeOverflowMass = 0;
                cell.mergeBurstPieces = 1;
                cell.mergeBurstTotal = cell.mass;
              }
            }
            if (cell.mass > 100 && !cappedThisFrame) {
              cell.mass = Math.max(MIN_CELL_MASS, cell.mass - cell.mass * MASS_DECAY_PER_SECOND * dt);
              refreshCell(cell);
            }

            if (cell.x < cell.radius) {
              cell.x = cell.radius;
              cell.boostX = Math.max(0, cell.boostX);
              cell.vx = Math.max(0, cell.vx);
            } else if (cell.x > WORLD_SIZE - cell.radius) {
              cell.x = WORLD_SIZE - cell.radius;
              cell.boostX = Math.min(0, cell.boostX);
              cell.vx = Math.min(0, cell.vx);
            }

            if (cell.y < cell.radius) {
              cell.y = cell.radius;
              cell.boostY = Math.max(0, cell.boostY);
              cell.vy = Math.max(0, cell.vy);
            } else if (cell.y > WORLD_SIZE - cell.radius) {
              cell.y = WORLD_SIZE - cell.radius;
              cell.boostY = Math.min(0, cell.boostY);
              cell.vy = Math.min(0, cell.vy);
            }

            appendCellSweepPoint(cell);
          }
        }
      }

      function tryMerge(actor, a, b) {
        if (!canCellMerge(a) || !canCellMerge(b)) return false;

        const aMergeMass = mergeAccountingMass(a);
        const bMergeMass = mergeAccountingMass(b);
        let big = aMergeMass >= bMergeMass ? a : b;
        let small = big === a ? b : a;
        const bigMergeMass = big === a ? aMergeMass : bMergeMass;
        const smallMergeMass = small === a ? aMergeMass : bMergeMass;
        const dominantId = mergeDominantId(a, b, aMergeMass, bMergeMass);
        const centerDistance = Math.hypot(a.x - b.x, a.y - b.y);
        if (mergePairCooling(actor, a, b)) return false;
        if (centerDistance >= a.radius + b.radius) {
          if (a.mergePartnerId === b.id || b.mergePartnerId === a.id) clearMergeAttempt(actor, a, b);
          return false;
        }

        if (hasMergeCancellation(actor, a, b, dominantId)) {
          resetCancelledMergeAttempt(actor, a, b, centerDistance);
          return false;
        }
        recordMergeAttempt(actor, a, b, dominantId || big.id);

        if (!hasHalfAreaOverlap(a, b, centerDistance)) return false;

        const total = bigMergeMass + smallMergeMass;
        const inv = 1 / total;
        big.x = (big.x * bigMergeMass + small.x * smallMergeMass) * inv;
        big.y = (big.y * bigMergeMass + small.y * smallMergeMass) * inv;
        big.vx = (big.vx * bigMergeMass + small.vx * smallMergeMass) * inv;
        big.vy = (big.vy * bigMergeMass + small.vy * smallMergeMass) * inv;
        big.boostX = (big.boostX * bigMergeMass + small.boostX * smallMergeMass) * inv;
        big.boostY = (big.boostY * bigMergeMass + small.boostY * smallMergeMass) * inv;
        big.mass = total > MAX_CELL_MASS
          ? Math.min(total, MAX_CELL_MASS * MERGE_CAP_OVERSIZE_RATIO)
          : total;
        big.virusCooldown = 0;
        big.mergeOverflowMass = Math.max(0, total - MAX_CELL_MASS);
        big.mergeBurstPieces = 1;
        big.mergeBurstTotal = total;
        big.mergeVirusWindow = total > MAX_CELL_MASS ? 4.0 : 0.28;
        if (big.mass > MAX_CELL_MASS) big.capFramesLeft = MASS_CAP_SETTLE_FRAMES;
        refreshCell(big);
        capVelocity(big, cellSpeed(big) * 1.25);
        capBoost(big, 120);
        clearMergeAttempt(actor, big, small);
        small.dead = true;
        return true;
      }

      function separateOwnCells(actor) {
        const iterations = 6;
        for (let pass = 0; pass < iterations; pass += 1) {
          for (let i = 0; i < actor.cells.length; i += 1) {
            const a = actor.cells[i];
            if (a.dead) continue;
            for (let j = i + 1; j < actor.cells.length; j += 1) {
              const b = actor.cells[j];
              if (b.dead) continue;
              const pairCooling = mergePairCooling(actor, a, b);
              const canMergePair = canCellMerge(a) && canCellMerge(b);

              const dx = b.x - a.x;
              const dy = b.y - a.y;
              const d = Math.hypot(dx, dy);
              const touch = a.radius + b.radius;
              if (d >= touch) {
                if (a.mergePartnerId === b.id || b.mergePartnerId === a.id) clearMergeAttempt(actor, a, b);
                continue;
              }
              if (!pairCooling && observeMergeCandidate(actor, a, b, d, canMergePair)) continue;
              if (canMergePair && !pairCooling) continue;
              if (!pairCooling && (a.separationGraceUntil > state.now || b.separationGraceUntil > state.now)) continue;

              const fallbackAngle = ((a.id * 12.9898 + b.id * 78.233 + pass * 37.719) % TAU);
              const nx = d < 0.001 ? Math.cos(fallbackAngle) : dx / d;
              const ny = d < 0.001 ? Math.sin(fallbackAngle) : dy / d;
              const overlap = touch - d + 0.75;
              const total = a.mass + b.mass;
              const aShare = b.mass / total;
              const bShare = a.mass / total;
              const aMoveX = a.vx + a.boostX;
              const aMoveY = a.vy + a.boostY;
              const bMoveX = b.vx + b.boostX;
              const bMoveY = b.vy + b.boostY;
              const aMoveSpeed = Math.hypot(aMoveX, aMoveY);
              const bMoveSpeed = Math.hypot(bMoveX, bMoveY);
              const sameSplitDirection = a.splitBoostAge > 0 && b.splitBoostAge > 0 &&
                aMoveSpeed > 1 && bMoveSpeed > 1 &&
                (aMoveX * bMoveX + aMoveY * bMoveY) / (aMoveSpeed * bMoveSpeed) > 0.88;
              let separateX = nx;
              let separateY = ny;
              if (sameSplitDirection) {
                const axis = normalized(aMoveX + bMoveX, aMoveY + bMoveY, aMoveX, aMoveY);
                const sign = (nx * axis.x + ny * axis.y) < 0 ? -1 : 1;
                separateX = axis.x * sign;
                separateY = axis.y * sign;
              }
              a.x -= separateX * overlap * aShare;
              a.y -= separateY * overlap * aShare;
              b.x += separateX * overlap * bShare;
              b.y += separateY * overlap * bShare;

              const relativeClosing = (bMoveX - aMoveX) * nx + (bMoveY - aMoveY) * ny;
              if (relativeClosing < 0 && !sameSplitDirection) {
                const correction = -relativeClosing * (a.splitBoostAge > 0 || b.splitBoostAge > 0 ? 0.62 : 0.28);
                a.boostX -= nx * correction * aShare;
                a.boostY -= ny * correction * aShare;
                b.boostX += nx * correction * bShare;
                b.boostY += ny * correction * bShare;
              }

              a.x = clamp(a.x, a.radius, WORLD_SIZE - a.radius);
              a.y = clamp(a.y, a.radius, WORLD_SIZE - a.radius);
              b.x = clamp(b.x, b.radius, WORLD_SIZE - b.radius);
              b.y = clamp(b.y, b.radius, WORLD_SIZE - b.radius);

            }
          }
        }
      }

      function limitOwnCellSpread(actor) {
        if (actor.cells.length < 2) return;
        const center = actorCenter(actor);
        const maxDistance = clamp(
          220 + Math.sqrt(center.mass) * 5 + actor.cells.length * 22,
          340,
          MAX_CELL_SPREAD
        );

        for (const cell of actor.cells) {
          if (cell.dead) continue;
          const dx = cell.x - center.x;
          const dy = cell.y - center.y;
          const d = Math.hypot(dx, dy);
          const splitAllowance = cell.splitBoostAge > 0
            ? SPLIT_SPREAD_ALLOWANCE * Math.min(1, cell.splitBoostAge / SPLIT_BOOST_DURATION)
            : 0;
          const allowed = maxDistance + cell.radius * 0.35 + splitAllowance;
          if (d <= allowed || d < 0.001) continue;

          const nx = dx / d;
          const ny = dy / d;
          const overshoot = d - allowed;
          const pull = Math.min(overshoot, 28 + overshoot * 0.26);
          cell.x -= nx * pull;
          cell.y -= ny * pull;

          const outwardBoost = cell.boostX * nx + cell.boostY * ny;
          if (outwardBoost > 0) {
            cell.boostX -= nx * outwardBoost * 0.55;
            cell.boostY -= ny * outwardBoost * 0.55;
          }

          const hardLimit = allowed * 1.16;
          if (d > hardLimit) {
            cell.x = center.x + nx * hardLimit;
            cell.y = center.y + ny * hardLimit;
          }

          cell.x = clamp(cell.x, cell.radius, WORLD_SIZE - cell.radius);
          cell.y = clamp(cell.y, cell.radius, WORLD_SIZE - cell.radius);
        }
      }

      function resolveOwnCells() {
        for (const actor of state.actors) {
          if (actor.lastMergeFrame !== state.frameIndex) {
            mergeLoop:
            for (let i = 0; i < actor.cells.length; i += 1) {
              for (let j = i + 1; j < actor.cells.length; j += 1) {
                if (tryMerge(actor, actor.cells[i], actor.cells[j])) {
                  actor.cells = actor.cells.filter((cell) => !cell.dead);
                  actor.lastMergeFrame = state.frameIndex;
                  break mergeLoop;
                }
              }
            }
          }
          separateOwnCells(actor);
          separateOwnCells(actor);
        }
      }

      function updateLooseMass(dt) {
        for (const feed of state.feeds) {
          feed.age += dt;
          feed.x += feed.vx * dt;
          feed.y += feed.vy * dt;
          const decay = Math.exp(-dt * 2.65);
          feed.vx *= decay;
          feed.vy *= decay;
          if (feed.x < feed.radius || feed.x > WORLD_SIZE - feed.radius) {
            feed.x = clamp(feed.x, feed.radius, WORLD_SIZE - feed.radius);
            feed.vx *= -0.22;
          }
          if (feed.y < feed.radius || feed.y > WORLD_SIZE - feed.radius) {
            feed.y = clamp(feed.y, feed.radius, WORLD_SIZE - feed.radius);
            feed.vy *= -0.22;
          }
        }

        for (const virus of state.viruses) {
          virus.x += virus.vx * dt;
          virus.y += virus.vy * dt;
          const decay = Math.exp(-dt * 1.25);
          virus.vx *= decay;
          virus.vy *= decay;
          if (virus.x < virus.radius || virus.x > WORLD_SIZE - virus.radius) {
            virus.x = clamp(virus.x, virus.radius, WORLD_SIZE - virus.radius);
            virus.vx *= -0.28;
          }
          if (virus.y < virus.radius || virus.y > WORLD_SIZE - virus.radius) {
            virus.y = clamp(virus.y, virus.radius, WORLD_SIZE - virus.radius);
            virus.vy *= -0.28;
          }
        }
      }

      function handleFoodEating() {
        const cells = allCells(scratch).sort((a, b) => b.radius - a.radius);
        const nearby = [];
        for (const cell of cells) {
          queryAlongCellPath(foodGrid, cell, cell.radius + 36, nearby);
          for (const food of nearby) {
            if (food.dead) continue;
            if (canConsumeSwept(cell, food)) {
              food.dead = true;
              addConsumedMass(cell, food.mass);
            }
          }
        }
      }

      function handleFeedVirusCollisions() {
        const nearby = [];
        for (const feed of state.feeds) {
          if (feed.dead) continue;
          virusGrid.query(feed.x, feed.y, 90, nearby);
          for (const virus of nearby) {
            if (virus.dead) continue;
            const hit = virus.radius + feed.radius * 0.4;
            if (distSq(feed.x, feed.y, virus.x, virus.y) > hit * hit) continue;

            feed.dead = true;
            const owner = actorById(feed.ownerId);
            if (owner) {
              virus.feedCount += 1;
              const n = normalized(feed.vx, feed.vy, feed.x - virus.x, feed.y - virus.y);
              if (virus.feedCount >= VIRUS_FEED_LIMIT) {
                virus.feedCount = 0;
                const spawnX = clamp(virus.x + n.x * (virus.radius * 2.1), virus.radius, WORLD_SIZE - virus.radius);
                const spawnY = clamp(virus.y + n.y * (virus.radius * 2.1), virus.radius, WORLD_SIZE - virus.radius);
                const newVirus = createVirus(spawnX, spawnY, false);
                newVirus.vx = n.x * 540;
                newVirus.vy = n.y * 540;
                state.viruses.push(newVirus);
              }
            }
            break;
          }
        }
      }

      function handleFeedEating() {
        const cells = allCells(scratch).sort((a, b) => b.radius - a.radius);
        const nearby = [];
        for (const cell of cells) {
          queryAlongCellPath(feedGrid, cell, cell.radius + 60, nearby);
          for (const feed of nearby) {
            if (feed.dead) continue;
            if (feed.ownerId === cell.ownerId && feed.age < 0.75) continue;
            if (canConsumeSwept(cell, feed)) {
              feed.dead = true;
              addConsumedMass(cell, feed.mass);
            }
          }
        }
      }

      function handleVirusCellCollisions() {
        const cells = allCells(scratch)
          .sort((a, b) => virusCollisionPriority(b) - virusCollisionPriority(a));
        const nearby = [];
        for (const cell of cells) {
          if (cell.dead) continue;
          queryAlongCellPath(virusGrid, cell, mergeVirusHitRadius(cell) + 360, nearby);
          for (const virus of nearby) {
            if (virus.dead) continue;
            const liveCells = liveCellCount(cell.actor);
            const eatsVirus = canConsumeVirus(cell, virus);

            if (liveCells >= MAX_CELLS) {
              if (eatsVirus) {
                virus.dead = true;
                addConsumedMass(cell, virus.mass);
                break;
              }
              continue;
            }

            if (cell.virusCooldown > 0) continue;
            if (mergeVirusHitMass(cell) < VIRUS_EXPLODE_MASS) continue;
            if (eatsVirus) {
              explodeCellOnVirus(cell.actor, cell, virus);
              virus.dead = true;
              break;
            }
          }
        }
      }

      function handleCellEating() {
        const cells = allCells(scratch).sort((a, b) => b.radius - a.radius);
        for (const eater of cells) {
          if (eater.dead) continue;
          const nearbyCells = cellGrid.query(eater.x, eater.y, eater.radius + 650, cellQueryScratch);
          for (const victim of nearbyCells) {
            if (victim.dead || victim.ownerId === eater.ownerId || victim === eater) continue;
            if (!canConsume(eater, victim)) continue;
            victim.dead = true;
            addConsumedMass(eater, victim.mass);
          }
        }
        handleSweptCellEating(cells);
      }

      function handleSweptCellEating(cells) {
        const sweptCells = cells.filter((cell) => !cell.dead && hasSweepPath(cell));
        if (!sweptCells.length) return;

        for (const eater of cells) {
          if (eater.dead) continue;
          for (const victim of sweptCells) {
            if (victim.dead || victim.ownerId === eater.ownerId || victim === eater) continue;
            if (!canConsumeSwept(eater, victim)) continue;
            victim.dead = true;
            addConsumedMass(eater, victim.mass);
          }
        }

        for (const eater of sweptCells) {
          if (eater.dead) continue;
          for (const victim of cells) {
            if (victim.dead || victim.ownerId === eater.ownerId || victim === eater) continue;
            if (!canConsumeSwept(eater, victim)) continue;
            victim.dead = true;
            addConsumedMass(eater, victim.mass);
          }
        }
      }

      function cleanupAndRespawn() {
        for (const actor of state.actors) {
          actor.cells = actor.cells.filter((cell) => !cell.dead && cell.mass >= MIN_CELL_MASS);
        }

        const guest = actorById("guest");
        const guestClone = remoteCloneActor("guest");
        if (guest || guestClone) {
          const guestActors = [guest, guestClone].filter(Boolean);
          const liveGuestActors = guestActors.filter((actor) => actor.cells.length > 0);
          if (!liveGuestActors.length && guest) {
            for (let i = state.actors.length - 1; i >= 0; i -= 1) {
              if (state.actors[i].id === localCloneId("guest")) state.actors.splice(i, 1);
            }
            guest.localClone = false;
            spawnActor(guest, playerSpawnMass());
            state.flashUntil = state.now + 1.25;
          }
        }

        const localActors = localHumanActors();
        if (localActors.length) {
          const liveLocalActors = localActors.filter((actor) => actor.cells.length > 0);
          if (!liveLocalActors.length) {
            const main = primaryLocalActor() || localActors[0];
            for (let i = state.actors.length - 1; i >= 0; i -= 1) {
              if (state.actors[i].localClone) state.actors.splice(i, 1);
            }
            if (main) {
              main.localClone = false;
              spawnActor(main, playerSpawnMass());
              setActiveLocalActor(main);
              state.flashUntil = state.now + 1.25;
            }
          } else if (!state.player || state.player.control !== "local" || state.player.cells.length === 0) {
            setActiveLocalActor(liveLocalActors[0]);
          }
        }

        for (const actor of state.actors) {
          if (actor.control === "local" && actor.isHuman) continue;
          if (actor.id === "guest" || actor.id === localCloneId("guest")) continue;
          if (actor.cells.length === 0) {
            if (actor.isHuman) {
              spawnActor(actor, playerSpawnMass());
              state.flashUntil = state.now + 1.25;
            } else {
              if (actor.respawnAt <= 0) {
                actor.respawnAt = state.now + 0.5;
              } else if (state.now >= actor.respawnAt) {
                spawnActor(actor, BOT_SPAWN_MASS);
              }
            }
          }
        }

        const foodsBeforeCleanup = state.foods.length;
        state.foods = state.foods.filter((food) => !food.dead);
        state.feeds = state.feeds.filter((feed) => !feed.dead);
        const foodTarget = state.settings.foodTarget;
        const virusTarget = state.settings.virusTarget;
        if (state.foods.length !== foodsBeforeCleanup) state.foodGridDirty = true;
        if (state.foods.length > foodTarget) {
          state.foods.length = foodTarget;
          state.foodGridDirty = true;
        }
        trimNaturalViruses(virusTarget);
        let liveVirusTotal = liveVirusCount();
        const maxQueuedViruses = Math.max(0, virusTarget - liveVirusTotal);
        if (state.virusRespawnQueue.length > maxQueuedViruses) {
          state.virusRespawnQueue.length = maxQueuedViruses;
        }

        const nextVirusRespawnQueue = [];
        let spawnedViruses = 0;
        for (const spawnAt of state.virusRespawnQueue) {
          if (
            spawnAt <= state.now &&
            liveVirusTotal < virusTarget &&
            spawnedViruses < MAX_VIRUS_SPAWNS_PER_FRAME
          ) {
            state.viruses.push(spawnVirusSafely());
            liveVirusTotal += 1;
            spawnedViruses += 1;
          } else {
            nextVirusRespawnQueue.push(spawnAt);
          }
        }
        state.virusRespawnQueue = nextVirusRespawnQueue;

        const foodSpawnBudget = Math.min(MAX_FOOD_SPAWNS_PER_FRAME, foodTarget - state.foods.length);
        for (let i = 0; i < foodSpawnBudget; i += 1) addFood();
        while (liveVirusTotal + state.virusRespawnQueue.length < virusTarget) {
          state.virusRespawnQueue.push(state.now + VIRUS_RESPAWN_DELAY);
        }
        ensureBotPopulation();
      }

      function updateCamera(dt) {
        const center = state.spectating
          ? spectatorCenter()
          : sharedLocalViewCenter(state.net.role === "client");
        const total = Math.max(1, center.mass);
        const cellCount = state.spectating ? 1 : Math.max(1, center.cellCount || state.player?.cells.length || 1);
        let targetZoom = mobileTargetZoom(total, cellCount);
        if (!state.spectating && center.spread > 0) {
          const fitZoom = Math.min(
            (state.width * 0.44) / center.spread,
            (state.height * 0.44) / center.spread
          );
          targetZoom = Math.min(targetZoom, clamp(fitZoom, 0.08, 1.28));
        }
        const follow = 1 - Math.exp(-dt * 5.3);
        state.camera.x += (center.x - state.camera.x) * follow;
        state.camera.y += (center.y - state.camera.y) * follow;
        state.camera.zoom += (targetZoom - state.camera.zoom) * (1 - Math.exp(-dt * 3.8));
      }

      function spectatorCenter() {
        let best = null;
        let bestMass = -1;
        for (const actor of state.actors) {
          const center = actorCenter(actor, state.net.role === "client");
          if (center.mass > bestMass) {
            bestMass = center.mass;
            best = center;
          }
        }
        return best || { x: WORLD_SIZE * 0.5, y: WORLD_SIZE * 0.5, mass: 1 };
      }

      function mobileTargetZoom(total, cellCount) {
        const baseZoom = clamp(
          Math.min(state.width, state.height) / (820 + Math.sqrt(total) * 23 + cellCount * 48),
          0.16,
          1.05
        );
        return clamp(baseZoom / state.viewScale, 0.08, 1.28);
      }

      function updateHud(dt) {
        state.hudTimer -= dt;
        if (state.hudTimer > 0) return;
        state.hudTimer = 0.12;

        const playerMass = totalMass(state.player);
        massEl.textContent = state.spectating ? "観戦" : String(Math.round(playerMass));
        cellsEl.textContent = state.spectating ? "-" : `${state.player.cells.length}/${MAX_CELLS}`;
        fpsEl.textContent = String(Math.round(state.fps));

        const ranked = state.actors
          .map((actor) => ({ actor, mass: totalMass(actor) }))
          .sort((a, b) => b.mass - a.mass)
          .slice(0, 10);
        const nutrientRow = `<div class="rank"><span>Σ</span><span>全体養分</span><b>${Math.round(totalServerNutrients())}</b></div>`;
        scoreboardEl.innerHTML = nutrientRow + ranked
          .map((entry, index) => {
            const cls = isLocalActor(entry.actor) ? "rank you" : "rank";
            return `<div class="${cls}"><span>${index + 1}</span><span>${escapeHtml(displayActorName(entry.actor))}</span><b>${Math.round(entry.mass)}</b></div>`;
          })
          .join("");

        flashEl.classList.toggle("show", state.now < state.flashUntil);
      }

      function processPlayerControls(now) {
        for (const actor of state.actors) {
          if (!isPlayerControlled(actor)) continue;
          if (state.spectating && actor.control === "local") continue;
          if (actor.input.ejectQueued) {
            if (ejectMass(actor, now) || now - actor.lastEject >= ejectInterval()) {
              actor.input.ejectQueued = false;
            }
          } else if (actorAutoEjectHeld(actor)) {
            ejectMass(actor, now, true);
          }
          if (actor.input.splitQueued) {
            if (!actor.input.splitLockActive) {
              const aim = actorAimDirection(actor);
              actor.input.splitLockX = aim.x;
              actor.input.splitLockY = aim.y;
              actor.input.splitLockActive = true;
              actor.nextQueuedSplitAt = Math.min(actor.nextQueuedSplitAt, now);
            }

            let remaining = Math.max(1, actor.input.splitCount || 1);
            let didAnySplit = false;
            if (remaining > 0 && now >= actor.nextQueuedSplitAt && liveCellCount(actor) < MAX_CELLS) {
              if (!splitActor(actor, actor.input.splitLockX, actor.input.splitLockY, now, 0, actor.input.targetX, actor.input.targetY)) {
                remaining = 0;
              } else {
                didAnySplit = true;
                remaining -= 1;
                actor.nextQueuedSplitAt = now + QUEUED_SPLIT_INTERVAL;
              }
            }

            actor.input.splitCount = Math.max(0, remaining);
            if (actor.input.splitCount <= 0 || (!didAnySplit && liveCellCount(actor) >= MAX_CELLS)) {
              actor.input.splitQueued = false;
              actor.input.splitCount = 0;
              actor.input.splitLockActive = false;
            }
          }
        }
        processBotManualControls(now);
      }

      function processBotManualControls(now) {
        const controllableBotMode = state.settings.botMode === "chase" || state.settings.botMode === "cursor";
        if (!controllableBotMode) {
          state.input.botSplitQueued = false;
          state.input.botEjectQueued = false;
          return;
        }

        if (state.input.botSplitQueued) {
          for (const bot of state.actors) {
            if (bot.isHuman) continue;
            const center = actorCenter(bot);
            const target = state.settings.botMode === "cursor"
              ? { x: state.input.mouseWorldX, y: state.input.mouseWorldY }
              : nearestHumanCell(center, bot.id);
            const aim = target
              ? normalized(target.x - center.x, target.y - center.y, bot.input.lastAimX, bot.input.lastAimY)
              : actorAimDirection(bot);
            splitActor(bot, aim.x, aim.y, now, 0, target?.x ?? bot.input.targetX, target?.y ?? bot.input.targetY);
          }
          state.input.botSplitQueued = false;
        }

        if (state.input.botEjectQueued || state.input.keys.has(state.keyBindings.botEject)) {
          for (const bot of state.actors) {
            if (bot.isHuman) continue;
            ejectMass(bot, now, true);
          }
          state.input.botEjectQueued = false;
        }
      }

      function update(dt, now, realNow = now) {
        state.now = now;
        state.realNow = realNow;
        updateMouseWorld();
        updateLocalActorInput();

        if (state.net.role === "client") {
          processClientNetworkUpdates();
          updateClientRenderState(dt);
          if (state.net.connected) sendLocalInput(state.realNow);
          updateCamera(dt);
          updateHud(dt);
          return;
        }

        processPlayerControls(now);

        rebuildSpatialHashes();
        for (const actor of state.actors) {
          if (!actor.isHuman) updateBotAI(actor, dt, now);
        }

        updateCellMotion(dt);
        resolveOwnCells();
        finishCellSweeps();
        updateLooseMass(dt);
        rebuildSpatialHashes();
        handleFeedVirusCollisions();
        handleFoodEating();
        handleFeedEating();
        handleVirusCellCollisions();
        handleCellEating();
        cleanupAndRespawn();
        updateCamera(dt);
        updateHud(dt);
        sendAuthoritativeSnapshot(state.realNow);
      }

      function networkSupported() {
        return typeof RTCPeerConnection === "function";
      }

      function peerJsSupported() {
        return typeof Peer === "function";
      }

      function normalizeRoomId() {
        ensureRelayDefaults();
        const room = roomBox.value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 24) || "agar";
        roomBox.value = room;
        return `agar-canvas-${room}`;
      }

      function createPeerConnection() {
        state.net.iceCandidates = 0;
        const pc = new RTCPeerConnection({
          iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" }
          ]
        });
        pc.onicecandidate = (event) => {
          if (event.candidate) {
            state.net.iceCandidates += 1;
            if (!state.net.connected) setStatus(`ICE ${state.net.iceCandidates}`);
          }
        };
        pc.onconnectionstatechange = () => {
          const status = pc.connectionState.toUpperCase();
          if (pc.connectionState === "connected") setStatus("CONNECTED");
          else if (pc.connectionState === "failed" || pc.connectionState === "disconnected") setStatus(status);
          else setStatus(status);
        };
        pc.oniceconnectionstatechange = () => {
          if (pc.iceConnectionState === "checking") setStatus("CHECKING");
          if (pc.iceConnectionState === "connected" || pc.iceConnectionState === "completed") setStatus("CONNECTED");
          if (pc.iceConnectionState === "failed") setStatus("ICE FAILED");
        };
        return pc;
      }

      function waitForIceGathering(pc, label = "ICE") {
        if (pc.iceGatheringState === "complete") return Promise.resolve();
        return new Promise((resolve) => {
          let done = false;
          const finish = () => {
            if (done) return;
            done = true;
            pc.removeEventListener("icegatheringstatechange", onChange);
            resolve();
          };
          const onChange = () => {
            if (!done) setStatus(`${label} ${pc.iceGatheringState.toUpperCase()}`);
            if (pc.iceGatheringState === "complete") finish();
          };
          pc.addEventListener("icegatheringstatechange", onChange);
          setStatus(`${label} WAIT`);
          setTimeout(finish, 9000);
        });
      }

      function parseSignal(text, label) {
        try {
          const value = text.trim();
          const signal = value.startsWith("AGAR1:")
            ? JSON.parse(base64UrlDecode(value.slice(6)))
            : JSON.parse(value);
          if (!signal || !signal.type || !signal.sdp) throw new Error("bad signal");
          return signal;
        } catch (error) {
          setStatus(`${label} NG`);
          return null;
        }
      }

      function base64UrlEncode(text) {
        return btoa(text).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function base64UrlDecode(text) {
        const normalized = text.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized + "=".repeat((4 - normalized.length % 4) % 4);
        return atob(padded);
      }

      function encodeSignal(description) {
        const payload = JSON.stringify({
          type: description.type,
          sdp: description.sdp
        });
        return `AGAR1:${base64UrlEncode(payload)}`;
      }

      function copySignal(text) {
        if (!navigator.clipboard || !navigator.clipboard.writeText) return;
        navigator.clipboard.writeText(text).catch(() => {});
      }

      function netSend(message) {
        if (state.net.transport === "peerjs") {
          const conn = state.net.peerConn;
          if (!conn || !conn.open) return false;
          try {
            conn.send(JSON.stringify(message));
            return true;
          } catch (error) {
            setStatus("ROOM SEND NG");
            return false;
          }
        }

        if (state.net.transport === "relay") {
          const socket = state.net.socket;
          if (!socket || socket.readyState !== WebSocket.OPEN) return false;
          try {
            socket.send(JSON.stringify(message));
            return true;
          } catch (error) {
            setStatus("RELAY SEND NG");
            return false;
          }
        }

        const channel = state.net.channel;
        if (!channel || channel.readyState !== "open") return false;
        try {
          channel.send(JSON.stringify(message));
          return true;
        } catch (error) {
          setStatus("SEND NG");
          return false;
        }
      }

      function setupDataChannel(channel) {
        state.net.transport = "webrtc";
        state.net.channel = channel;
        channel.onopen = () => {
          state.net.connected = true;
          setStatus("CONNECTED");
          if (state.net.role === "host") {
            state.net.lastSnapshotSend = -100;
            state.net.lastWorldSend = -100;
            sendAuthoritativeSnapshot(state.realNow || performance.now() / 1000, true);
          }
        };
        channel.onclose = () => {
          if (state.net.channel === channel) state.net.channel = null;
          state.net.connected = false;
          if (state.net.role === "client") {
            continueOfflineAfterHostLoss();
            return;
          }
          setStatus("CLOSED");
        };
        channel.onerror = () => {
          if (state.net.channel === channel) state.net.channel = null;
          if (state.net.role === "client") {
            continueOfflineAfterHostLoss();
            return;
          }
          setStatus("CHANNEL NG");
        };
        channel.onmessage = (event) => handleNetMessage(event.data);
      }

      function setupPeerJsConnection(conn) {
        if (state.net.peerConn && state.net.peerConn !== conn) {
          if (state.net.connected && state.net.peerConn.open !== false) {
            try { conn.close(); } catch (error) {}
            setStatus("ROOM FULL");
            return;
          }
          try { state.net.peerConn.close(); } catch (error) {}
          state.net.peerConn = null;
          state.net.connected = false;
        }

        state.net.transport = "peerjs";
        state.net.peerConn = conn;
        conn.on("open", () => {
          if (state.net.connectTimer) {
            clearTimeout(state.net.connectTimer);
            state.net.connectTimer = 0;
          }
          state.net.connected = true;
          setStatus("CONNECTED");
          if (state.net.role === "host") {
            state.net.lastSnapshotSend = -100;
            state.net.lastWorldSend = -100;
            sendAuthoritativeSnapshot(state.realNow || performance.now() / 1000, true);
          }
        });
        conn.on("data", (data) => {
          handleNetMessage(typeof data === "string" ? data : JSON.stringify(data));
        });
        conn.on("close", () => {
          if (state.net.peerConn === conn) state.net.peerConn = null;
          state.net.connected = false;
          if (state.net.role === "client") {
            continueOfflineAfterHostLoss();
            return;
          }
          setStatus("CLOSED");
        });
        conn.on("error", () => {
          if (state.net.peerConn === conn) state.net.peerConn = null;
          state.net.connected = false;
          if (state.net.role === "client" && !state.net.connected) {
            setStatus("NO ROOM");
            setTimeout(() => {
              if (state.net.transport === "peerjs" && !state.net.connected) continueOfflineAfterHostLoss();
            }, 900);
            return;
          }
          setStatus("ROOM NG");
        });
      }

      function resetFreshWorld(localId, onlineMode = false) {
        syncProfileFromInputs();
        WORLD_SIZE = state.settings.worldSize;
        setSpectating(false);
        state.localCloneIndex = 0;
        state.localActorId = localId;
        state.input.activeActorId = localId;
        state.input.cloneQueued = false;
        state.input.cloneSeq = 0;
        state.input.botSplitQueued = false;
        state.actors.length = 0;
        state.foods.length = 0;
        state.foodGridDirty = true;
        state.feeds.length = 0;
        state.viruses.length = 0;
        state.virusRespawnQueue.length = 0;
        state.nextBotIndex = 0;

        if (onlineMode) {
          const host = createActor("host", localId === "host" ? localProfileName() : "P1", "#2e90fa", true, localId === "host" ? "local" : "remote");
          const guest = createActor("guest", localId === "guest" ? localProfileName() : "P2", "#f04438", true, localId === "guest" ? "local" : "remote");
          state.actors.push(host, guest);
          state.player = localId === "guest" ? guest : host;
          if (localId === "host") {
            spawnActor(host, playerSpawnMass());
            spawnActor(guest, playerSpawnMass());
            const initialFood = Math.min(state.settings.foodTarget, DEFAULT_FOOD_TARGET);
            while (state.foods.length < initialFood) addFood();
            const center = actorCenter(host);
            seedInitialViruses(center.x, center.y);
          }
        } else {
          const player = createActor("player", localProfileName(), "#2e90fa", true, "local");
          state.player = player;
          state.actors.push(player);
          spawnActor(player, playerSpawnMass());
          ensureBotPopulation();
          const initialFood = Math.min(state.settings.foodTarget, DEFAULT_FOOD_TARGET);
          while (state.foods.length < initialFood) addFood();
          const center = actorCenter(player);
          seedInitialViruses(center.x, center.y);
        }

        const center = actorCenter(state.player);
        state.camera.x = center.x;
        state.camera.y = center.y;
        state.camera.zoom = mobileTargetZoom(Math.max(1, center.mass), Math.max(1, state.player.cells.length));
        rebuildSpatialHashes();
        state.flashUntil = state.now + 1.0;
      }

      function closeNetwork(keepWorld = true) {
        if (state.net.connectTimer) {
          clearTimeout(state.net.connectTimer);
          state.net.connectTimer = 0;
        }
        if (state.net.socket) {
          state.net.socket.onopen = null;
          state.net.socket.onclose = null;
          state.net.socket.onerror = null;
          state.net.socket.onmessage = null;
          try { state.net.socket.close(); } catch (error) {}
        }
        if (state.net.channel) {
          state.net.channel.onopen = null;
          state.net.channel.onclose = null;
          state.net.channel.onerror = null;
          state.net.channel.onmessage = null;
          try { state.net.channel.close(); } catch (error) {}
        }
        if (state.net.peerConn) {
          try { state.net.peerConn.close(); } catch (error) {}
        }
        if (state.net.peer) {
          state.net.peer.removeAllListeners();
          try { state.net.peer.destroy(); } catch (error) {}
        }
        if (state.net.pc) {
          state.net.pc.onconnectionstatechange = null;
          state.net.pc.oniceconnectionstatechange = null;
          state.net.pc.ondatachannel = null;
          try { state.net.pc.close(); } catch (error) {}
        }
        state.net.role = "offline";
        state.net.transport = "none";
        state.net.pc = null;
        state.net.channel = null;
        state.net.peer = null;
        state.net.peerConn = null;
        state.net.connectTimer = 0;
        state.net.socket = null;
        state.net.connected = false;
        state.net.iceCandidates = 0;
        state.net.worldBuffer = null;
        state.net.pendingSnapshot = null;
        state.net.pendingWorldChunks.length = 0;
        state.net.lastInputSend = -100;
        state.net.lastSnapshotSend = -100;
        state.net.lastWorldSend = -100;
        setStatus("OFFLINE");
        if (!keepWorld) resetFreshWorld("player", false);
      }

      function continueOfflineAfterHostLoss() {
        if (state.net.role !== "client") return;
        closeNetwork(false);
        setStatus("OFFLINE PLAY");
      }

      async function startHostOnline() {
        if (!networkSupported()) {
          setStatus("NO WEBRTC");
          return;
        }
        closeNetwork(true);
        resetFreshWorld("host", true);
        state.net.role = "host";
        state.net.transport = "webrtc";
        const pc = createPeerConnection();
        state.net.pc = pc;
        setupDataChannel(pc.createDataChannel("agar-state"));
        setStatus("MAKE OFFER");
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await waitForIceGathering(pc, "OFFER ICE");
        const signal = encodeSignal(pc.localDescription);
        offerBox.value = signal;
        copySignal(signal);
        offerBox.focus();
        offerBox.select();
        setStatus("OFFER OK");
      }

      function startRoomHost() {
        if (!peerJsSupported()) {
          setStatus("PEERJS LOAD NG");
          return;
        }

        closeNetwork(true);
        resetFreshWorld("host", true);
        state.net.role = "host";
        state.net.transport = "peerjs";
        const peerId = normalizeRoomId();
        const peer = new Peer(peerId, {
          debug: 0,
          config: {
            iceServers: [
              { urls: "stun:stun.l.google.com:19302" },
              { urls: "stun:stun1.l.google.com:19302" }
            ]
          }
        });
        state.net.peer = peer;
        setStatus("ROOM OPENING");
        peer.on("open", () => setStatus(`ROOM ${roomBox.value}`));
        peer.on("connection", setupPeerJsConnection);
        peer.on("error", (error) => {
          if (error && error.type === "unavailable-id") setStatus("ROOM BUSY");
          else setStatus("ROOM NG");
        });
        peer.on("disconnected", () => setStatus("ROOM LOST"));
      }

      function joinRoom() {
        if (!peerJsSupported()) {
          setStatus("PEERJS LOAD NG");
          return;
        }

        closeNetwork(true);
        resetFreshWorld("guest", true);
        state.net.role = "client";
        state.net.transport = "peerjs";
        const hostPeerId = normalizeRoomId();
        const peer = new Peer(undefined, {
          debug: 0,
          config: {
            iceServers: [
              { urls: "stun:stun.l.google.com:19302" },
              { urls: "stun:stun1.l.google.com:19302" }
            ]
          }
        });
        state.net.peer = peer;
        setStatus("ROOM JOINING");
        peer.on("open", () => {
          const conn = peer.connect(hostPeerId, {
            label: "agar-state",
            reliable: false
          });
          setupPeerJsConnection(conn);
          state.net.connectTimer = setTimeout(() => {
            if (state.net.transport !== "peerjs" || state.net.connected) return;
            setStatus("NO ROOM");
            setTimeout(() => {
              if (state.net.transport === "peerjs" && !state.net.connected) continueOfflineAfterHostLoss();
            }, 900);
          }, 3500);
        });
        peer.on("error", () => continueOfflineAfterHostLoss());
        peer.on("disconnected", () => continueOfflineAfterHostLoss());
      }

      async function createGuestAnswer() {
        if (!networkSupported()) {
          setStatus("NO WEBRTC");
          return;
        }
        const offer = parseSignal(offerBox.value, "OFFER");
        if (!offer) return;
        closeNetwork(true);
        resetFreshWorld("guest", true);
        state.net.role = "client";
        state.net.transport = "webrtc";
        const pc = createPeerConnection();
        state.net.pc = pc;
        pc.ondatachannel = (event) => setupDataChannel(event.channel);
        setStatus("MAKE ANSWER");
        await pc.setRemoteDescription(offer);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await waitForIceGathering(pc, "ANSWER ICE");
        const signal = encodeSignal(pc.localDescription);
        answerBox.value = signal;
        copySignal(signal);
        answerBox.focus();
        answerBox.select();
        setStatus("ANSWER OK");
      }

      async function applyHostAnswer() {
        if (state.net.role !== "host" || !state.net.pc) {
          setStatus("NO HOST");
          return;
        }
        const answer = parseSignal(answerBox.value, "ANSWER");
        if (!answer) return;
        await state.net.pc.setRemoteDescription(answer);
        setStatus("CONNECTING");
      }

      function startRelayOnline(role) {
        if (typeof WebSocket !== "function") {
          setStatus("NO WS");
          return;
        }

        ensureRelayDefaults();
        const url = serverUrlBox.value.trim();
        if (!/^wss?:\/\//i.test(url)) {
          setStatus("SET RELAY URL");
          serverUrlBox.focus();
          return;
        }
        const room = roomBox.value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 24) || "agar";
        roomBox.value = room;

        closeNetwork(true);
        resetFreshWorld(role === "host" ? "host" : "guest", true);
        state.net.role = role === "host" ? "host" : "client";
        state.net.transport = "relay";
        state.net.connected = false;
        setStatus("RELAY CONNECT");

        const socket = new WebSocket(url);
        state.net.socket = socket;

        socket.onopen = () => {
          state.net.connected = true;
          setStatus("RELAY JOIN");
          socket.send(JSON.stringify({
            t: "relayJoin",
            room,
            role: state.net.role
          }));
          if (state.net.role === "host") {
            state.net.lastSnapshotSend = -100;
            state.net.lastWorldSend = -100;
          }
        };

        socket.onmessage = (event) => handleRelayMessage(event.data);
        socket.onerror = () => setStatus("RELAY NG");
        socket.onclose = () => {
          state.net.connected = false;
          if (state.net.transport !== "relay") return;
          if (state.net.role === "client") {
            continueOfflineAfterHostLoss();
            return;
          }
          setStatus("RELAY CLOSED");
        };
      }

      function handleRelayMessage(data) {
        let message = null;
        try {
          message = JSON.parse(data);
        } catch (error) {
          return;
        }

        if (message.t === "relayReady") {
          setStatus(`ROOM ${message.peers}/2`);
          return;
        }

        if (message.t === "relayPeer") {
          setStatus(`PEER ${message.peers}/2`);
          if (state.net.role === "host" && message.peers >= 2) {
            sendAuthoritativeSnapshot(state.realNow || performance.now() / 1000, true);
          }
          return;
        }

        if (message.t === "relayError") {
          setStatus(message.message || "RELAY ERROR");
          return;
        }

        handleNetMessage(JSON.stringify(message));
      }

      function serializeCell(cell) {
        return {
          id: cell.id,
          x: cell.x,
          y: cell.y,
          mass: cell.mass,
          vx: cell.vx,
          vy: cell.vy,
          boostX: cell.boostX,
          boostY: cell.boostY,
          faceX: cell.faceX,
          faceY: cell.faceY,
          mergeReadyAt: cell.mergeReadyAt,
          capFramesLeft: cell.capFramesLeft,
          birthAge: cell.birthAge,
          birthDuration: cell.birthDuration,
          birthX: cell.birthX,
          birthY: cell.birthY,
          birthScale: cell.birthScale,
          fragmentAge: cell.fragmentAge,
          splitBoostAge: cell.splitBoostAge,
          splitHoldAge: cell.splitHoldAge,
          pendingBoostX: cell.pendingBoostX,
          pendingBoostY: cell.pendingBoostY,
          virusCooldown: cell.virusCooldown,
          mergeVirusWindow: cell.mergeVirusWindow,
          mergeOverflowMass: cell.mergeOverflowMass,
          mergeBurstPieces: cell.mergeBurstPieces,
          mergeBurstTotal: cell.mergeBurstTotal,
          splitPriority: cell.splitPriority,
          targetX: cell.targetX,
          targetY: cell.targetY
        };
      }

      function serializeActor(actor) {
        return {
          id: actor.id,
          name: actor.name,
          color: actor.color,
          isHuman: actor.isHuman,
          localClone: Boolean(actor.localClone),
          cells: actor.cells.filter((cell) => !cell.dead).map(serializeCell)
        };
      }

      function serializeCircle(entity) {
        return {
          id: entity.id,
          x: entity.x,
          y: entity.y,
          mass: entity.mass,
          radius: entity.radius,
          color: entity.color,
          vx: entity.vx || 0,
          vy: entity.vy || 0,
          age: entity.age || 0,
          feedCount: entity.feedCount || 0,
          ownerId: entity.ownerId || "",
          natural: entity.natural !== false
        };
      }

      function sendAuthoritativeSnapshot(now, forceWorld = false) {
        if (state.net.role !== "host" || !state.net.connected) return;
        const sendFast = forceWorld || now - state.net.lastSnapshotSend >= 1 / 14;
        const sendWorld = forceWorld || now - state.net.lastWorldSend >= 1.0;
        if (!sendFast && !sendWorld) return;

        const message = {
          t: "snapshot",
          now,
          worldSize: WORLD_SIZE,
          settings: {
            splitSpeed: state.settings.splitSpeed,
            splitMinDistance: state.settings.splitMinDistance,
            spawnMass: state.settings.spawnMass,
            gameSpeed: state.settings.gameSpeed,
            nRespawnEnabled: state.settings.nRespawnEnabled
          },
          actors: state.actors.map(serializeActor),
          feeds: feedsForNetworkSync().map(serializeCircle)
        };
        if (netSend(message)) state.net.lastSnapshotSend = now;
        if (sendWorld) {
          state.net.worldSeq += 1;
          sendWorldChunks("foods", foodsForNetworkSync().map(serializeCircle), state.net.worldSeq);
          sendWorldChunks("viruses", state.viruses.filter((virus) => !virus.dead).map(serializeCircle), state.net.worldSeq);
          state.net.lastWorldSend = now;
        }
      }

      function foodsForNetworkSync() {
        if (state.foodGridDirty) rebuildFoodGridOnly();
        const liveFoods = state.foods.filter((food) => !food.dead);
        if (liveFoods.length <= MAX_SYNC_FOODS) return liveFoods;
        return networkEntitiesNearHumans(foodGrid, MAX_SYNC_FOODS, NETWORK_RENDER_RANGE);
      }

      function feedsForNetworkSync() {
        const liveFeeds = state.feeds.filter((feed) => !feed.dead);
        if (liveFeeds.length <= MAX_SYNC_FEEDS) return liveFeeds;
        return networkEntitiesNearHumans(feedGrid, MAX_SYNC_FEEDS, NETWORK_RENDER_RANGE);
      }

      function networkEntitiesNearHumans(grid, limit, range) {
        const items = [];
        const seen = new Set();
        for (const actor of state.actors) {
          if (!actor || !actor.isHuman) continue;
          const center = actorCenter(actor);
          const nearby = grid.queryRect(center.x - range, center.y - range, center.x + range, center.y + range, aiEntityScratch);
          for (const item of nearby) {
            if (item.dead || seen.has(item.id)) continue;
            seen.add(item.id);
            items.push(item);
            if (items.length >= limit) return items;
          }
        }
        return items;
      }

      function sendWorldChunks(kind, items, seq) {
        const total = Math.max(1, Math.ceil(items.length / WORLD_SYNC_CHUNK));
        for (let index = 0; index < total; index += 1) {
          const start = index * WORLD_SYNC_CHUNK;
          netSend({
            t: "world",
            kind,
            seq,
            index,
            total,
            items: items.slice(start, start + WORLD_SYNC_CHUNK)
          });
        }
      }

      function sendLocalInput(now) {
        if (state.net.role !== "client" || !state.net.connected || !state.player) return;
        const urgent = state.player.input.splitQueued || state.player.input.ejectQueued || state.input.respawnQueued || state.input.cloneQueued;
        if (!urgent && now - state.net.lastInputSend < 1 / 60) return;
        netSend({
          t: "input",
          activeActorId: state.input.activeActorId || state.player.id,
          targetX: state.player.input.targetX,
          targetY: state.player.input.targetY,
          e: actorAutoEjectHeld(state.player),
          ejectSeq: state.input.ejectSeq,
          splitSeq: state.input.splitSeq,
          respawnSeq: state.input.respawnSeq,
          cloneSeq: state.input.cloneSeq
        });
        state.player.input.ejectQueued = false;
        state.player.input.splitQueued = false;
        state.player.input.splitCount = 0;
        state.input.respawnQueued = false;
        state.input.cloneQueued = false;
        state.net.lastInputSend = now;
      }

      function processClientNetworkUpdates() {
        const chunks = state.net.pendingWorldChunks;
        for (let i = 0; i < CLIENT_WORLD_CHUNKS_PER_FRAME && chunks.length; i += 1) {
          applyWorldChunk(chunks.shift());
        }
        if (state.net.pendingSnapshot) {
          const snapshot = state.net.pendingSnapshot;
          state.net.pendingSnapshot = null;
          applySnapshot(snapshot);
        }
      }

      function updateRenderPosition(entity, dt, followRate = 18) {
        if (!Number.isFinite(entity.renderX)) entity.renderX = entity.x;
        if (!Number.isFinite(entity.renderY)) entity.renderY = entity.y;
        const speed = Math.hypot((entity.vx || 0) + (entity.boostX || 0), (entity.vy || 0) + (entity.boostY || 0));
        const lead = entity.splitBoostAge > 0 ? Math.min(0.12, dt * 4) : Math.min(0.08, dt * 2);
        const targetX = clamp(entity.x + ((entity.vx || 0) + (entity.boostX || 0)) * lead, 0, WORLD_SIZE);
        const targetY = clamp(entity.y + ((entity.vy || 0) + (entity.boostY || 0)) * lead, 0, WORLD_SIZE);
        if (entity.splitBoostAge > 0 && speed > 220) followRate = Math.max(followRate, 30);
        const follow = 1 - Math.exp(-dt * followRate);
        entity.renderX += (targetX - entity.renderX) * follow;
        entity.renderY += (targetY - entity.renderY) * follow;
      }

      function updateClientRenderState(dt) {
        for (const actor of state.actors) {
          for (const cell of actor.cells) updateRenderPosition(cell, dt, 20);
        }
        for (const feed of state.feeds) updateRenderPosition(feed, dt, 14);
        for (const virus of state.viruses) updateRenderPosition(virus, dt, 10);
      }

      function handleNetMessage(data) {
        let message = null;
        try {
          message = JSON.parse(data);
        } catch (error) {
          return;
        }

        if (state.net.role === "host" && message.t === "input") {
          const guest = actorById("guest");
          if (!guest) return;
          let urgentInput = false;
          const cloneSeq = Number(message.cloneSeq) || 0;
          let guestClone = remoteCloneActor("guest");
          if (cloneSeq > guest.input.lastNetCloneSeq) {
            guestClone = handleRemoteCloneToggle(guest);
            guest.input.lastNetCloneSeq = cloneSeq;
            urgentInput = true;
          }

          const requestedActorId = typeof message.activeActorId === "string" ? message.activeActorId : "guest";
          guestClone = remoteCloneActor("guest");
          let activeGuest = requestedActorId === localCloneId("guest") && guestClone ? guestClone : guest;
          if (activeGuest.cells.length === 0 && guest.cells.length > 0) activeGuest = guest;
          if (activeGuest.cells.length === 0 && guestClone && guestClone.cells.length > 0) activeGuest = guestClone;
          for (const actor of [guest, guestClone]) {
            if (actor && actor !== activeGuest) clearActorControlInput(actor, true);
          }

          activeGuest.input.targetX = clamp(Number(message.targetX) || WORLD_SIZE * 0.5, 0, WORLD_SIZE);
          activeGuest.input.targetY = clamp(Number(message.targetY) || WORLD_SIZE * 0.5, 0, WORLD_SIZE);
          if (message.e) activeGuest.input.keys.add(remoteAutoEjectKey);
          else activeGuest.input.keys.delete(remoteAutoEjectKey);
          const ejectSeq = Number(message.ejectSeq) || 0;
          if (ejectSeq > guest.input.lastNetEjectSeq) {
            activeGuest.input.ejectQueued = true;
            guest.input.lastNetEjectSeq = ejectSeq;
            urgentInput = true;
          }
          const splitSeq = Number(message.splitSeq) || 0;
          if (splitSeq > guest.input.lastNetSplitSeq) {
            const splitCount = Math.min(4, splitSeq - guest.input.lastNetSplitSeq);
            activeGuest.input.splitQueued = true;
            activeGuest.input.splitCount += splitCount;
            guest.input.lastNetSplitSeq = splitSeq;
            urgentInput = true;
          }
          const respawnSeq = Number(message.respawnSeq) || 0;
          if (respawnSeq > guest.input.lastNetRespawnSeq) {
            if (state.settings.nRespawnEnabled) {
              spawnActor(activeGuest, playerSpawnMass());
            }
            guest.input.lastNetRespawnSeq = respawnSeq;
            urgentInput = true;
          }
          if (urgentInput) state.net.lastSnapshotSend = -100;
          return;
        }

        if (state.net.role === "client" && message.t === "splitEvent" && message.actor) {
          const actor = applyActorSnapshot(message.actor);
          if (!state.actors.includes(actor)) state.actors.push(actor);
          if (isLocalControlledActorId(actor.id) && actor.id === state.input.activeActorId) state.player = actor;
          updateClientRenderState(1 / 60);
          return;
        }

        if (state.net.role === "client" && message.t === "snapshot") {
          state.net.pendingSnapshot = message;
          return;
        }

        if (state.net.role === "client" && message.t === "world") {
          state.net.pendingWorldChunks.push(message);
          if (state.net.pendingWorldChunks.length > CLIENT_WORLD_QUEUE_LIMIT) {
            state.net.pendingWorldChunks.splice(0, state.net.pendingWorldChunks.length - CLIENT_WORLD_QUEUE_LIMIT);
          }
        }
      }

      function applyCellSnapshot(actor, data, existing = null) {
        const cell = existing || {};
        cell.id = data.id;
        cell.actor = actor;
        cell.ownerId = actor.id;
        cell.x = clamp(data.x, 0, WORLD_SIZE);
        cell.y = clamp(data.y, 0, WORLD_SIZE);
        cell.mass = Math.max(MIN_CELL_MASS, data.mass);
        cell.radius = 1;
        cell.vx = data.vx || 0;
        cell.vy = data.vy || 0;
        cell.boostX = data.boostX || 0;
        cell.boostY = data.boostY || 0;
        const face = normalized(
          data.faceX == null ? (Number.isFinite(existing?.faceX) ? existing.faceX : 1) : data.faceX,
          data.faceY == null ? (Number.isFinite(existing?.faceY) ? existing.faceY : 0) : data.faceY,
          1,
          0
        );
        cell.faceX = face.x;
        cell.faceY = face.y;
        cell.sweepActive = false;
        cell.sweepPoints = null;
        cell.sweepFromX = cell.x;
        cell.sweepFromY = cell.y;
        cell.sweepToX = cell.x;
        cell.sweepToY = cell.y;
        cell.renderX = Number.isFinite(existing?.renderX) ? existing.renderX : cell.x;
        cell.renderY = Number.isFinite(existing?.renderY) ? existing.renderY : cell.y;
        cell.cooldown = 0;
        cell.mergeReadyAt = data.mergeReadyAt || 0;
        cell.capFramesLeft = data.capFramesLeft || 0;
        cell.birthAge = data.birthAge == null ? 1 : data.birthAge;
        cell.birthDuration = data.birthDuration || 0;
        cell.birthX = data.birthX == null ? data.x : data.birthX;
        cell.birthY = data.birthY == null ? data.y : data.birthY;
        cell.birthScale = data.birthScale == null ? 1 : data.birthScale;
        cell.fragmentAge = data.fragmentAge || 0;
        cell.splitBoostAge = data.splitBoostAge || 0;
        cell.splitHoldAge = data.splitHoldAge || 0;
        cell.pendingBoostX = data.pendingBoostX || 0;
        cell.pendingBoostY = data.pendingBoostY || 0;
        cell.virusCooldown = data.virusCooldown || 0;
        cell.mergeVirusWindow = data.mergeVirusWindow || 0;
        cell.mergeOverflowMass = data.mergeOverflowMass || 0;
        cell.mergeBurstPieces = data.mergeBurstPieces || 1;
        cell.mergeBurstTotal = data.mergeBurstTotal || data.mass;
        cell.splitPriority = data.splitPriority || existing?.splitPriority || 0;
        cell.targetX = data.targetX == null ? data.x : data.targetX;
        cell.targetY = data.targetY == null ? data.y : data.targetY;
        cell.dead = false;
        refreshCell(cell);
        return cell;
      }

      function applyActorSnapshot(data) {
        const isLocalControlled = isLocalControlledActorId(data.id);
        let actor = actorById(data.id);
        if (!actor) {
          actor = createActor(
            data.id,
            data.name || data.id,
            data.color || "#2e90fa",
            Boolean(data.isHuman),
            isLocalControlled ? "local" : (data.isHuman ? "remote" : "bot")
          );
        }
        actor.name = data.name || actor.name;
        actor.color = data.color || actor.color;
        actor.isHuman = Boolean(data.isHuman);
        actor.localClone = Boolean(data.localClone);
        actor.control = isLocalControlled ? "local" : (actor.isHuman ? "remote" : "bot");
        const cellsById = new Map(actor.cells.map((cell) => [cell.id, cell]));
        actor.cells = (data.cells || []).map((cellData) => applyCellSnapshot(actor, cellData, cellsById.get(cellData.id)));
        refreshNextSplitPriority(actor);
        return actor;
      }

      function applyEntitySnapshot(data, type, existing = null) {
        return {
          id: data.id,
          type,
          x: clamp(data.x, 0, WORLD_SIZE),
          y: clamp(data.y, 0, WORLD_SIZE),
          mass: Math.max(type === "food" ? 1 : MIN_CELL_MASS, data.mass),
          radius: data.radius || radiusFromMass(data.mass),
          color: data.color || (type === "virus" ? "#12e05a" : foodPalette[0]),
          vx: data.vx || 0,
          vy: data.vy || 0,
          age: data.age || 0,
          feedCount: data.feedCount || 0,
          ownerId: data.ownerId || "",
          natural: type === "virus" ? data.natural !== false : false,
          renderX: Number.isFinite(existing?.renderX) ? existing.renderX : clamp(data.x, 0, WORLD_SIZE),
          renderY: Number.isFinite(existing?.renderY) ? existing.renderY : clamp(data.y, 0, WORLD_SIZE),
          dead: false
        };
      }

      function applyEntityListSnapshot(items, type, existingList) {
        const byId = new Map(existingList.map((entity) => [entity.id, entity]));
        return (items || []).map((entity) => applyEntitySnapshot(entity, type, byId.get(entity.id)));
      }

      function applySnapshot(message) {
        if (message.worldSize) {
          const incomingWorldSize = Math.max(2000, Math.round(Number(message.worldSize) / 100) * 100);
          const previousMax = state.settings.max.worldSize;
          state.settings.max.worldSize = Math.max(previousMax, incomingWorldSize);
          const nextWorldSize = clamp(incomingWorldSize, 2000, state.settings.max.worldSize);
          const worldChanged = nextWorldSize !== state.settings.worldSize || nextWorldSize !== WORLD_SIZE;
          if (worldChanged) {
            state.settings.worldSize = nextWorldSize;
            clampWorldEntities();
          }
          if (worldChanged || state.settings.max.worldSize !== previousMax) syncSettingsControls();
        }
        if (message.settings) {
          let settingsChanged = false;
          if (Number.isFinite(message.settings.splitSpeed)) {
            const nextMax = Math.max(state.settings.max.splitSpeed, message.settings.splitSpeed);
            const nextValue = clamp(message.settings.splitSpeed, 10, nextMax);
            settingsChanged = settingsChanged || nextMax !== state.settings.max.splitSpeed || nextValue !== state.settings.splitSpeed;
            state.settings.max.splitSpeed = nextMax;
            state.settings.splitSpeed = nextValue;
          }
          if (Number.isFinite(message.settings.splitMinDistance)) {
            const nextMax = Math.max(state.settings.max.splitMinDistance, message.settings.splitMinDistance);
            const nextValue = clamp(message.settings.splitMinDistance, 0, nextMax);
            settingsChanged = settingsChanged || nextMax !== state.settings.max.splitMinDistance || nextValue !== state.settings.splitMinDistance;
            state.settings.max.splitMinDistance = nextMax;
            state.settings.splitMinDistance = nextValue;
          }
          if (Number.isFinite(message.settings.spawnMass)) {
            const nextMax = Math.max(state.settings.max.spawnMass, message.settings.spawnMass);
            const nextValue = clamp(message.settings.spawnMass, MIN_CELL_MASS, nextMax);
            settingsChanged = settingsChanged || nextMax !== state.settings.max.spawnMass || nextValue !== state.settings.spawnMass;
            state.settings.max.spawnMass = nextMax;
            state.settings.spawnMass = nextValue;
          }
          if (Number.isFinite(message.settings.gameSpeed)) {
            const nextMax = Math.max(state.settings.max.gameSpeed, message.settings.gameSpeed);
            const nextValue = clamp(message.settings.gameSpeed, 0.1, nextMax);
            settingsChanged = settingsChanged || nextMax !== state.settings.max.gameSpeed || nextValue !== state.settings.gameSpeed;
            state.settings.max.gameSpeed = nextMax;
            state.settings.gameSpeed = nextValue;
          }
          if (message.settings.nRespawnEnabled != null) {
            const nextValue = Boolean(message.settings.nRespawnEnabled);
            settingsChanged = settingsChanged || nextValue !== state.settings.nRespawnEnabled;
            state.settings.nRespawnEnabled = nextValue;
          }
          if (settingsChanged) syncSettingsControls();
        }
        const actors = (message.actors || []).map(applyActorSnapshot);
        state.actors = actors;
        const activeActor = actorById(state.input.activeActorId);
        state.player = activeActor && activeActor.control === "local"
          ? activeActor
          : actorById(state.localActorId) || actors[0] || state.player;

        state.feeds = applyEntityListSnapshot(message.feeds, "feed", state.feeds);
      }

      function applyWorldChunk(message) {
        if (message.kind !== "foods" && message.kind !== "viruses") return;
        if (!state.net.worldBuffer || state.net.worldBuffer.seq !== message.seq) {
          state.net.worldBuffer = {
            seq: message.seq,
            foods: new Map(),
            viruses: new Map()
          };
        }

        const bucket = state.net.worldBuffer[message.kind];
        bucket.set(message.index, message.items || []);
        if (bucket.size < message.total) return;

        const merged = [];
        for (let index = 0; index < message.total; index += 1) {
          const chunk = bucket.get(index);
          if (!chunk) return;
          merged.push(...chunk);
        }

        if (message.kind === "foods") {
          state.foods = applyEntityListSnapshot(merged, "food", state.foods);
          state.foodGridDirty = true;
          rebuildFoodGridOnly();
        } else {
          state.viruses = applyEntityListSnapshot(merged, "virus", state.viruses);
        }
      }

      function visibleWorldBounds(pad = 120) {
        const halfW = state.width * 0.5 / state.camera.zoom;
        const halfH = state.height * 0.5 / state.camera.zoom;
        return {
          left: state.camera.x - halfW - pad,
          right: state.camera.x + halfW + pad,
          top: state.camera.y - halfH - pad,
          bottom: state.camera.y + halfH + pad
        };
      }

      function renderDistanceForLocalMass(center) {
        if (state.spectating) return WORLD_SIZE;
        const mass = Math.max(1, center.mass || 1);
        const spread = Math.max(0, center.spread || 0);
        return clamp(620 + Math.sqrt(mass) * 24 + spread * 0.48, 820, 2900);
      }

      function renderWorldBounds(visibleBounds) {
        if (state.spectating) return visibleBounds;
        const center = sharedLocalViewCenter(state.net.role === "client");
        const range = renderDistanceForLocalMass(center);
        return {
          left: Math.max(visibleBounds.left, center.x - range),
          right: Math.min(visibleBounds.right, center.x + range),
          top: Math.max(visibleBounds.top, center.y - range),
          bottom: Math.min(visibleBounds.bottom, center.y + range)
        };
      }

      function entityRenderX(entity) {
        return Number.isFinite(entity.renderX) ? entity.renderX : entity.x;
      }

      function entityRenderY(entity) {
        return Number.isFinite(entity.renderY) ? entity.renderY : entity.y;
      }

      function isVisible(item, bounds, pad = 0) {
        const x = entityRenderX(item);
        const y = entityRenderY(item);
        return x + item.radius + pad >= bounds.left &&
          x - item.radius - pad <= bounds.right &&
          y + item.radius + pad >= bounds.top &&
          y - item.radius - pad <= bounds.bottom;
      }

      function drawGrid(bounds, renderMode = 0) {
        ctx.lineWidth = 1 / state.camera.zoom;
        ctx.strokeStyle = "#e6ebf2";
        if (renderMode < 2) {
          ctx.beginPath();
          const startSmallX = Math.floor(bounds.left / GRID_SMALL) * GRID_SMALL;
          const endSmallX = Math.ceil(bounds.right / GRID_SMALL) * GRID_SMALL;
          const startSmallY = Math.floor(bounds.top / GRID_SMALL) * GRID_SMALL;
          const endSmallY = Math.ceil(bounds.bottom / GRID_SMALL) * GRID_SMALL;
          for (let x = startSmallX; x <= endSmallX; x += GRID_SMALL) {
            ctx.moveTo(x, bounds.top);
            ctx.lineTo(x, bounds.bottom);
          }
          for (let y = startSmallY; y <= endSmallY; y += GRID_SMALL) {
            ctx.moveTo(bounds.left, y);
            ctx.lineTo(bounds.right, y);
          }
          ctx.stroke();
        }

        ctx.lineWidth = 1.4 / state.camera.zoom;
        ctx.strokeStyle = "#cfd8e3";
        ctx.beginPath();
        const largeStep = renderMode >= 2 ? GRID_LARGE * 2 : GRID_LARGE;
        const startLargeX = Math.floor(bounds.left / largeStep) * largeStep;
        const endLargeX = Math.ceil(bounds.right / largeStep) * largeStep;
        const startLargeY = Math.floor(bounds.top / largeStep) * largeStep;
        const endLargeY = Math.ceil(bounds.bottom / largeStep) * largeStep;
        for (let x = startLargeX; x <= endLargeX; x += largeStep) {
          ctx.moveTo(x, bounds.top);
          ctx.lineTo(x, bounds.bottom);
        }
        for (let y = startLargeY; y <= endLargeY; y += largeStep) {
          ctx.moveTo(bounds.left, y);
          ctx.lineTo(bounds.right, y);
        }
        ctx.stroke();
      }

      function drawCircleEntity(entity) {
        ctx.beginPath();
        ctx.arc(entityRenderX(entity), entityRenderY(entity), entity.radius, 0, TAU);
        ctx.fillStyle = entity.color;
        ctx.fill();
      }

      function drawBatchedCircleEntities(entities, renderMode = 1) {
        for (const items of entityBatchByColor.values()) items.length = 0;
        for (const entity of entities) {
          let items = entityBatchByColor.get(entity.color);
          if (!items) {
            items = [];
